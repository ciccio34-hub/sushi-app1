<!DOCTYPE html>
<html>
<head>
<title>Cucina</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:20px;
}

.order{
background:#222;
padding:15px;
margin:15px auto;
border-radius:12px;
width:350px;
}
</style>
</head>

<body>

<h1>🍣 ORDINI CUCINA</h1>
<div id="orders"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCW2MF4P8D9lYtQML-ZwZPbjF-MDIOHIC4",
authDomain: "sushi-web-54e9b.firebaseapp.com",
projectId: "sushi-web-54e9b",
storageBucket: "sushi-web-54e9b.firebasestorage.app",
messagingSenderId: "1023587576077",
appId: "1:1023587576077:web:1024f53b1895b133556844"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container=document.getElementById("orders");

onSnapshot(collection(db,"orders"),snapshot=>{
container.innerHTML="";

snapshot.forEach(doc=>{
let o=doc.data();

container.innerHTML+=`
<div class="order">
<ul>
${o.items.map(i=>`<li>${i.qty} x ${i.name}</li>`).join("")}
</ul>
<p>Totale: €${o.total}</p>
</div>
`;
});
});

</script>

</body>
</html>
