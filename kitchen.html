<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cucina</title>

<style>
body{background:black;color:white;font-family:Arial;padding:20px}

.order{
background:#222;
padding:15px;
margin-bottom:15px
}

button{
background:lime;
border:none;
padding:5px 10px
}
</style>

</head>

<body>

<h1>Ordini cucina</h1>

<div id="orders"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"

const firebaseConfig={
apiKey:"AIzaSyCW2MF4P8D9lYtQML-ZwZPbjF-MDIOHIC4",
authDomain:"sushi-web-54e9b.firebaseapp.com",
projectId:"sushi-web-54e9b",
storageBucket:"sushi-web-54e9b.firebasestorage.app",
messagingSenderId:"1023587576077",
appId:"1:1023587576077:web:1024f53b1895b133556844"
}

const app=initializeApp(firebaseConfig)
const db=getFirestore(app)

let orders=[]

onSnapshot(collection(db,"orders"),snap=>{

orders=[]
let html=""

snap.forEach(d=>{
orders.push({id:d.id,...d.data()})
})

orders.forEach(o=>{

html+="<div class='order'>"

o.items.forEach((i,index)=>{

html+=`
<div>
${i.name} - ${i.status}
<button onclick="ready('${o.id}',${index})">pronto</button>
</div>
`

})

html+="</div>"

})

document.getElementById("orders").innerHTML=html

})

window.ready=async(id,index)=>{

let order=orders.find(o=>o.id==id)

order.items[index].status="ready"

await updateDoc(doc(db,"orders",id),{
items:order.items
})

}

</script>

</body>
</html>
