<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cucina</title>

<style>
body{
  font-family:Arial, sans-serif;
  background: linear-gradient(120deg,#ffe0b2,#fff3e0);
  color:#111;
  padding:20px;
}
.order{
  background:#fff3e0;
  padding:20px;
  margin-bottom:20px;
  border-radius:10px;
  font-size:22px;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}
button{
  border:none;
  padding:8px 12px;
  border-radius:5px;
  color:white;
  cursor:pointer;
  margin-top:5px;
  font-size:16px;
}
.prepBtn{background:orange;}
.readyBtn{background:#4caf50;}
.deleteBtn{background:#9e9e9e;}
</style>
</head>

<body>

<div id="orders"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import { getFirestore,collection,onSnapshot,updateDoc,doc,deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"

const firebaseConfig = {
apiKey: "AIzaSyCW2MF4P8D9lYtQML-ZwZPbjF-MDIOHIC4",
authDomain: "sushi-web-54e9b.firebaseapp.com",
projectId: "sushi-web-54e9b",
storageBucket: "sushi-web-54e9b.firebasestorage.app",
messagingSenderId: "1023587576077",
appId: "1:1023587576077:web:1024f53b1895b133556844"
}

const app = initializeApp(firebaseConfig)
const db = getFirestore(app)
let orders=[]

onSnapshot(collection(db,"orders"),snapshot=>{
  orders=[]
  snapshot.forEach(d=>{ orders.push({id:d.id,...d.data()}) })
  renderOrders()
})

function renderOrders(){
  let html=""
  orders.forEach(o=>{
    html+=`<div class="order">`
    o.items.forEach((item,i)=>{
      html+=`${item.name} 
      <button class="prepBtn" onclick="setStatus('${o.id}',${i},'prep')">In preparazione</button>
      <button class="readyBtn" onclick="setStatus('${o.id}',${i},'ready')">Pronto</button><br>`
    })
    html+=`<button class="deleteBtn" onclick="deleteOrder('${o.id}')">Elimina ordine</button>`
    html+=`</div>`
  })
  document.getElementById("orders").innerHTML=html
}

window.setStatus=async(id,i,status)=>{
  let order=orders.find(o=>o.id==id)
  order.items[i].status=status
  await updateDoc(doc(db,"orders",id),{items:order.items})
}

window.deleteOrder=async(id)=>{
  if(confirm("Eliminare questo ordine?")){
    await deleteDoc(doc(db,"orders",id))
  }
}
</script>

</body>
</html>
