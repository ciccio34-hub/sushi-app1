<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cucina Sushi</title>

<style>
body{
  background:#111;
  color:white;
  font-family:Arial;
  padding:20px;
}

.order{
  background:#222;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}

button{
  margin-left:10px;
  padding:5px 10px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.ready{
  background:#4caf50;
  color:white;
}
</style>
</head>

<body>

<h1>👨‍🍳 CUCINA</h1>
<div id="orders"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import { getFirestore,collection,onSnapshot,updateDoc,doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"

const firebaseConfig={
apiKey:"AIzaSyCW2MF4P8D9lYtQML-ZwZPbjF-MDIOHIC4",
authDomain:"sushi-web-54e9b.firebaseapp.com",
projectId:"sushi-web-54e9b"
}

const app=initializeApp(firebaseConfig)
const db=getFirestore(app)

let orders=[]

onSnapshot(collection(db,"orders"),snap=>{
  orders=[]
  snap.forEach(d=>{
    orders.push({id:d.id,...d.data()})
  })
  render()
})

function render(){
  const container=document.getElementById("orders")
  container.innerHTML=""

  orders.forEach(order=>{
    const div=document.createElement("div")
    div.className="order"

    order.items.forEach((item,index)=>{
      const p=document.createElement("p")
      p.innerText=item.name+" - "+item.status

      if(item.status==="prep"){
        const btn=document.createElement("button")
        btn.innerText="Pronto"
        btn.className="ready"

        btn.addEventListener("click", async ()=>{
          const ref=doc(db,"orders",order.id)
          order.items[index].status="ready"
          await updateDoc(ref,{items:order.items})
        })

        p.appendChild(btn)
      }

      div.appendChild(p)
    })

    container.appendChild(div)
  })
}
</script>

</body>
</html>
