<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cucina Sushi</title>

<style>
body{
  background:#111;
  color:white;
  font-family:Arial;
  padding:20px;
}

.order{
  background:#222;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}

button{
  margin-left:10px;
  padding:5px 10px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.ready{
  background:#4caf50;
  color:white;
}
</style>
</head>

<body>

<h1>👨‍🍳 CUCINA</h1>
<div id="orders"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import { getFirestore,collection,onSnapshot,updateDoc,doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"

const firebaseConfig={
apiKey:"AIzaSyCW2MF4P8D9lYtQML-ZwZPbjF-MDIOHIC4",
authDomain:"sushi-web-54e9b.firebaseapp.com",
projectId:"sushi-web-54e9b"
}

const app=initializeApp(firebaseConfig)
const db=getFirestore(app)

let orders=[]

onSnapshot(collection(db,"orders"),snap=>{
  orders=[]
  snap.forEach(d=>{
    orders.push({id:d.id,...d.data()})
  })
  render()
})

function render(){
  let html=""

  orders.forEach(order=>{
    html+=`<div class="order">`

    order.items.forEach((item,index)=>{
      html+=`
        <p>
          ${item.name} - ${item.status}
          ${
            item.status==="prep"
            ? `<button class="ready" onclick="markReady('${order.id}',${index})">Pronto</button>`
            : ""
          }
        </p>
      `
    })

    html+="</div>"
  })

  document.getElementById("orders").innerHTML=html
}

window.markReady=async(id,index)=>{
  const ref=doc(db,"orders",id)

  const order=orders.find(o=>o.id===id)
  order.items[index].status="ready"

  await updateDoc(ref,{items:order.items})
}
</script>

</body>
</html>
