<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sushi</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

header{
text-align:center;
padding:20px;
font-size:40px;
color:gold;
border-bottom:2px solid gold;
}

.container{
display:flex;
}

.menu{
width:70%;
padding:20px;
}

.cart{
width:30%;
background:#222;
padding:20px;
}

.section{
margin-bottom:30px;
}

.item{
background:#333;
padding:10px;
margin:10px 0;
border-radius:8px;
}

button{
margin:3px;
padding:5px 10px;
cursor:pointer;
}

.plus{
background:gold;
border:none;
}

.minus{
background:#555;
color:white;
border:none;
}

.order-btn{
margin-top:10px;
width:100%;
padding:8px;
background:gold;
border:none;
font-weight:bold;
}
</style>
</head>

<body>

<header>SUSHI</header>

<div class="container">

<div class="menu">

<div class="section">
<h2>Bevande</h2>
<div class="item">
Acqua Naturale €2
<button class="minus" onclick="add('Acqua Naturale',2,-1)">-</button>
<button class="plus" onclick="add('Acqua Naturale',2,1)">+</button>
</div>
</div>

</div>

<div class="cart">
<h3>Carrello</h3>
<div id="cart"></div>
Totale €<span id="tot">0</span>

<button class="order-btn" onclick="invia()">Invia Ordine</button>

<h3>Ordini In Tempo Reale</h3>
<div id="ordini"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCW2MF4P8D9lYtQML-ZwZPbjF-MDIOHIC4",
authDomain: "sushi-web-54e9b.firebaseapp.com",
projectId: "sushi-web-54e9b",
storageBucket: "sushi-web-54e9b.firebasestorage.app",
messagingSenderId: "1023587576077",
appId: "1:1023587576077:web:1024f53b1895b133556844"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cart=[];

window.add = function(nome, prezzo, q){

let trovato = cart.find(p=>p.nome===nome);

if(!trovato && q>0){
cart.push({nome,prezzo,quantita:1});
}
else if(trovato){
trovato.quantita += q;
if(trovato.quantita<=0){
cart = cart.filter(p=>p.nome!==nome);
}
}

aggiorna();
}

function aggiorna(){

let div=document.getElementById("cart");
let tot=document.getElementById("tot");

div.innerHTML="";
let totale=0;

cart.forEach(p=>{
totale += p.prezzo*p.quantita;
div.innerHTML+= p.nome+" x"+p.quantita+"<br>";
});

tot.innerText=totale;
}

window.invia = async function(){

if(cart.length===0){
alert("Carrello vuoto");
return;
}

await addDoc(collection(db,"orders"),{
items:cart,
stato:"In preparazione",
time:new Date()
});

cart=[];
aggiorna();
alert("Ordine inviato!");
}

onSnapshot(collection(db,"orders"),snapshot=>{
let div=document.getElementById("ordini");
div.innerHTML="";

snapshot.forEach(doc=>{
let data=doc.data();

div.innerHTML+=`
<div style="border:1px solid gold;padding:10px;margin:5px;">
${data.items.map(i=>i.nome+" x"+i.quantita).join("<br>")}
<br>
Stato: ${data.stato}
</div>
`;
});
});

</script>

</body>
</html>
