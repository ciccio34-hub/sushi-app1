<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sushi Order</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#ff6b6b,#ffb347);
margin:0;
padding:20px;
text-align:center;
}

h1{
color:white;
}

#menu{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-top:30px;
}

.item{
background:white;
padding:20px;
border-radius:12px;
width:200px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

button{
background:#ff4d4d;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#e60023;
}

#cartBox{
background:white;
margin-top:30px;
padding:20px;
border-radius:12px;
width:300px;
margin-left:auto;
margin-right:auto;
}

</style>
</head>

<body>

<h1>🍣 Sushi Menu</h1>

<div id="menu">

<div class="item">
<h3>Salmon Nigiri</h3>
<p>€5</p>
<button onclick="addToCart('Salmon Nigiri',5)">Aggiungi</button>
</div>

<div class="item">
<h3>Tuna Roll</h3>
<p>€6
