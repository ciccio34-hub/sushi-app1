<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sushi Ordini</title>

<script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>

<style>
body {
    background: #1c1c1c;
    color: white;
    font-family: Arial;
    padding: 20px;
}
button {
    padding: 10px;
    margin: 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>🍣 Sushi Ordini</h1>

<div>
    <button onclick="addItem('Salmone', 7)">Salmone €7</button>
    <button onclick="addItem('Tonno', 7)">Tonno €7</button>
</div>

<h2>Carrello</h2>
<div id="cart-items"></div>

<button onclick="sendOrder()">INVIA ORDINE</button>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCuQrgfoRP79a6RxK2eFbFowaZySmLadmI",
    authDomain: "il-vero-sushi.firebaseapp.com",
    projectId: "il-vero-sushi",
};

let app = firebase.initializeApp(firebaseConfig);
let db = firebase.database();
let ordersRef = db.ref("orders");

let cart = {};
let total = 0;

function addItem(name, price) {
    if (!cart[name]) {
        cart[name] = { q: 0, p: price };
    }

    cart[name].q++;
    total += price;

    updateCart();
}

function updateCart() {
    let html = "";

    Object.keys(cart).forEach(k => {
        html += `<p>${k} x${cart[k].q}</p>`;
    });

    document.getElementById("cart-items").innerHTML = html;
}

async function sendOrder() {
    if (Object.keys(cart).length === 0) {
        alert("Carrello vuoto!");
        return;
    }

    let items = [];

    Object.keys(cart).forEach(k => {
        for (let i = 0; i < cart[k].q; i++) {
            items.push({
                name: k,
                status: "prep",
                price: cart[k].p
            });
        }
    });

    let order = {
        items: items,
        total: total,
        timestamp: Date.now()
    };

    console.log("INVIO:", order);

    try {
        await ordersRef.push(order);

        alert("✅ ORDINE INVIATO!");

        cart = {};
        total = 0;
        updateCart();

    } catch (e) {
        console.error(e);
        alert("ERRORE: " + e.message);
    }
}
</script>

</body>
</html>
