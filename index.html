<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sushi ORDINI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#fafafa;
}
header{
  background:#d84315;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
header h1{
  margin:0;
  font-size:22px;
}
header button{
  background:#ff5722;
  border:none;
  color:white;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
  margin-left:8px;
}
.container{
  display:flex;
  height:calc(100vh - 60px);
}

/* MENU */
.menu{
  flex:2;
  padding:20px;
  overflow:auto;
  background:#fff;
}
.item{
  background:#fff;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
  border-left:4px solid #d84315;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.item button{
  background:#d84315;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

/* CARRELLO */
.cart{
  flex:1;
  padding:20px;
  border-left:3px solid #eee;
  background:#fff;
}
.cart h2{
  margin-top:0;
}
.order{
  background:#f9f9f9;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
  border:1px solid #ddd;
}
.status-prep{
  color:#ff9800;
  font-weight:bold;
}
.status-ready{
  color:#4caf50;
  font-weight:bold;
}

</style>
</head>

<body>

<header>
  <h1>🍣 Sushi ORDINI</h1>
  <div>
    <button onclick="showKitchen()">CUCINA</button>
  </div>
</header>

<div class="container">

  <div class="menu" id="menu"></div>

  <div class="cart">
    <h2>🛒 Carrello</h2>
    <div id="cart"></div>
    <h3 id="total">Totale €0</h3>
    <button onclick="sendOrder()">Invia Ordine</button>

    <h2>I tuoi ordini</h2>
    <div id="orders"></div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"

const firebaseConfig = {
apiKey: "AIzaSyCW2MF4P8D9lYtQML-ZwPbjF-MDIOHIC4",
authDomain: "sushi-web-54e9b.firebaseapp.com",
projectId: "sushi-web-54e9b",
storageBucket: "sushi-web-54e9b.firebasestorage.app",
messagingSenderId: "1023587576077",
appId: "1:1023587576077:web:1024f53b1895b133556844"
}

const app = initializeApp(firebaseConfig)
const db = getFirestore(app)

let cart={}, total=0, orders=[]

const menuData=[
  {name:"Salmon Nigiri",price:5},
  {name:"Tuna Roll",price:6},
  {name:"Uramaki",price:7},
  {name:"Sashimi",price:8}
]

/* MENU */
function renderMenu(){
  let html=""
  menuData.forEach(item=>{
    html+=`
    <div class="item">
      <div>
        <b>${item.name}</b><br>€${item.price}
      </div>
      <div>
        <button onclick="addItem('${item.name}',${item.price})">+</button>
        <button onclick="removeItem('${item.name}',${item.price})">–</button>
      </div>
    </div>`
  })
  document.getElementById("menu").innerHTML=html
}

window.addItem=(name,price)=>{
  if(!cart[name]) cart[name]={qty:0,price}
  cart[name].qty++
  total+=price
  updateCart()
}

window.removeItem=(name,price)=>{
  if(!cart[name]) return
  cart[name].qty--
  total-=price
  if(cart[name].qty<=0) delete cart[name]
  updateCart()
}

function updateCart(){
  let html=""
  Object.keys(cart).forEach(name=>{ html+=`${name} x ${cart[name].qty}<br>` })
  document.getElementById("cart").innerHTML=html
  document.getElementById("total").innerText="Totale €"+total
}

/* INVIA ORDINE */
window.sendOrder=async()=>{
  if(Object.keys(cart).length===0){
    alert("Carrello vuoto")
    return
  }
  let items=[]
  Object.keys(cart).forEach(name=>{
    for(let i=0;i<cart[name].qty;i++){
      items.push({name:name,status:"prep"})
    }
  })
  await addDoc(collection(db,"orders"),{items:items,time:Date.now()})
  cart={}, total=0
  updateCart()
}

/* ORDINI IN TEMPO REALE */
onSnapshot(collection(db,"orders"),snapshot=>{
  orders=[]
  snapshot.forEach(d=>{ orders.push({id:d.id,...d.data()}) })
  renderOrders()
})

function renderOrders(){
  let html=""
  orders.forEach(o=>{
    html+=`<div class="order">`
    o.items.forEach(item=>{
      let statusText = item.status=="ready" ?
        `<span class="status-ready">🟢 Pronto</span>` :
        `<span class="status-prep">🟡 In preparazione</span>`
      html+=`<p>${item.name} - ${statusText}</p>`
    })
    html+=`</div>`
  })
  document.getElementById("orders").innerHTML=html
}

renderMenu()

</script>

</body>
</html>
