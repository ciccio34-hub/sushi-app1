<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sushi ORDINI</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#000;
  color:#ffd700;
}
header{
  background:#111;
  color:#ffd700;
  padding:15px;
  display:flex;
  justify-content:flex-start;
  align-items:center;
}
header h1{
  margin:0;
  font-size:22px;
}
.container{
  display:flex;
  height:calc(100vh - 60px);
}

/* MENU */
.menu{
  flex:2;
  padding:20px;
  overflow:auto;
  background:#111;
  border-radius: 10px;
}
.section{
  margin-bottom:25px;
}
.section h2{
  margin-bottom:10px;
  border-bottom:1px solid #ffd700;
}
.item{
  background:#222;
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
  display:flex;
  justify-content:space-between;
}
.item button{
  background:#ffd700;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  color:#000;
  cursor:pointer;
}

/* CARRELLO */
.cart{
  flex:1;
  padding:20px;
  border-left:3px solid #333;
  background:#111;
  overflow:auto;
  border-radius:15px;
}
.cart h2{
  margin-top:0;
  color:#ffd700;
}
.order{
  background:#222;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
  border:1px solid #333;
}
.status-prep{color:#ffa500;font-weight:bold;}
.status-ready{color:#4caf50;font-weight:bold;}
</style>
</head>

<body>

<header>
  <h1>🍣 Sushi ORDINI</h1>
</header>

<div class="container">
  <div class="menu" id="menu"></div>

  <div class="cart">
    <h2>🛒 Carrello</h2>
    <div id="cart"></div>
    <h3 id="total">Totale €0</h3>
    <button onclick="sendOrder()">Invia Ordine</button>

    <h2>I tuoi ordini</h2>
    <div id="orders"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import { getFirestore,collection,addDoc,onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"

const firebaseConfig = {
apiKey: "AIzaSyCW2MF4P8D9lYtQML-ZwZPbjF-MDIOHIC4",
authDomain: "sushi-web-54e9b.firebaseapp.com",
projectId: "sushi-web-54e9b",
storageBucket: "sushi-web-54e9b.firebasestorage.app",
messagingSenderId: "1023587576077",
appId: "1:1023587576077:web:1024f53b1895b133556844"
}

const app = initializeApp(firebaseConfig)
const db = getFirestore(app)

let cart={}, total=0, orders=[]

const menuData=[
  {section:"Bevande",items:[{name:"Acqua naturale",price:1},{name:"Acqua frizzante",price:1}]},
  {section:"Antipasti",items:[
    {name:"Nuvole di drago",price:5},{name:"Involtini primavera",price:4},
    {name:"Gyoza",price:4},{name:"Ravioli di gambero",price:5}
  ]},
  {section:"Sashimi",items:[{name:"Sashimi salmone",price:7},{name:"Sashimi tonno",price:7}]},
  {section:"Nigiri",items:[{name:"Nigiri salmone",price:5},{name:"Nigiri tonno",price:5},{name:"Nigiri gambero",price:5}]},
  {section:"Roll con alga e Philadelphia",items:[
    {name:"Roll salmone",price:6},{name:"Roll salmone e fragole",price:6},{name:"Roll salmone e mango",price:6},
    {name:"Roll tonno",price:6},{name:"Roll tonno e fragole",price:6},{name:"Roll tonno e mango",price:6},
    {name:"Roll gambero",price:6},{name:"Roll gambero e fragole",price:6},{name:"Roll gambero e mango",price:6}
  ]},
  {section:"Roll con alga senza Philadelphia",items:[
    {name:"Roll salmone",price:5},{name:"Roll salmone e fragole",price:5},{name:"Roll salmone e mango",price:5},
    {name:"Roll tonno",price:5},{name:"Roll tonno e fragole",price:5},{name:"Roll tonno e mango",price:5},
    {name:"Roll gambero",price:5},{name:"Roll gambero e fragole",price:5},{name:"Roll gambero e mango",price:5}
  ]},
  {section:"Roll senza alga con Philadelphia",items:[
    {name:"Roll salmone",price:6},{name:"Roll salmone e fragole",price:6},{name:"Roll salmone e mango",price:6},
    {name:"Roll tonno",price:6},{name:"Roll tonno e fragole",price:6},{name:"Roll tonno e mango",price:6},
    {name:"Roll gambero",price:6},{name:"Roll gambero e fragole",price:6},{name:"Roll gambero e mango",price:6}
  ]},
  {section:"Roll senza alga senza Philadelphia",items:[
    {name:"Roll salmone",price:5},{name:"Roll salmone e fragole",price:5},{name:"Roll salmone e mango",price:5},
    {name:"Roll tonno",price:5},{name:"Roll tonno e fragole",price:5},{name:"Roll tonno e mango",price:5},
    {name:"Roll gambero",price:5},{name:"Roll gambero e fragole",price:5},{name:"Roll gambero e mango",price:5}
  ]}
]

function renderMenu(){
  let html=""
  menuData.forEach(section=>{
    html+=`<div class="section"><h2>${section.section}</h2>`
    section.items.forEach(item=>{
      html+=`<div class="item">
        <span>${item.name} €${item.price}</span>
        <div>
          <button onclick="addItem('${item.name}',${item.price})">+</button>
          <button onclick="removeItem('${item.name}',${item.price})">–</button>
        </div>
      </div>`
    })
    html+=`</div>`
  })
  document.getElementById("menu").innerHTML=html
}

window.addItem=(name,price)=>{
  if(!cart[name]) cart[name]={qty:0,price}
  cart[name].qty++
  total+=price
  updateCart()
}

window.removeItem=(name,price)=>{
  if(!cart[name]) return
  cart[name].qty--
  total-=price
  if(cart[name].qty<=0) delete cart[name]
  updateCart()
}

function updateCart(){
  let html=""
  Object.keys(cart).forEach(name=>{ html+=`${name} x ${cart[name].qty}<br>` })
  document.getElementById("cart").innerHTML=html
  document.getElementById("total").innerText="Totale €"+total
}

window.sendOrder=async()=>{
  if(Object.keys(cart).length===0){ alert("Carrello vuoto"); return }
  let items=[]
  Object.keys(cart).forEach(name=>{
    for(let i=0;i<cart[name].qty;i++){
      items.push({name:name,status:"prep"})
    }
  })
  await addDoc(collection(db,"orders"),{items:items,time:Date.now()})
  cart={}, total=0
  updateCart()
}

onSnapshot(collection(db,"orders"),snapshot=>{
  orders=[]
  snapshot.forEach(d=>{ orders.push({id:d.id,...d.data()}) })
  renderOrders()
})

function renderOrders(){
  let html=""
  orders.forEach(o=>{
    html+=`<div class="order">`
    o.items.forEach(item=>{
      let statusText = item.status=="ready" ? `<span class="status-ready">Pronto</span>` :
                       `<span class="status-prep">In preparazione</span>`
      html+=`<p>${item.name} - ${statusText}</p>`
    })
    html+=`</div>`
  })
  document.getElementById("orders").innerHTML=html
}

renderMenu()
</script>

</body>
</html>
