<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sushi Restaurant</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff512f,#dd2476,#ff9966);
color:white;
}

header{
text-align:center;
padding:25px;
font-size:35px;
font-weight:bold;
letter-spacing:2px;
}

.container{
display:flex;
padding:20px;
gap:25px;
}

.menu{flex:3;}

.section{margin-bottom:40px;}

.section h2{
border-left:4px solid #ffd700;
padding-left:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:15px;
margin-top:15px;
}

.item{
background:rgba(255,255,255,0.15);
padding:15px;
border-radius:12px;
text-align:center;
backdrop-filter:blur(6px);
border:1px solid rgba(255,255,255,0.2);
}

.item h4{
margin:8px 0;
}

button{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
margin:3px;
font-weight:bold;
}

.plus{
background:#ff9800;
color:white;
}

.minus{
background:#d32f2f;
color:white;
}

.cart{
flex:1;
background:rgba(0,0,0,0.25);
backdrop-filter:blur(8px);
padding:20px;
border-radius:15px;
max-height:90vh;
overflow-y:auto;
border:1px solid rgba(255,255,255,0.2);
}

.pronto{
color:#00ff99;
font-weight:bold;
}

.preparazione{
color:#ffeb3b;
font-weight:bold;
}

.order-box{
background:rgba(255,255,255,0.15);
padding:10px;
margin-top:10px;
border-radius:8px;
}
</style>
</head>

<body>

<header>🍣 SUSHI RESTAURANT</header>

<div class="container">

<div class="menu" id="menu"></div>

<div class="cart">
<h3>Carrello</h3>
<div id="cartList"></div>
<h4>Totale €<span id="total">0</span></h4>
<button onclick="sendOrder()">Invia Ordine</button>

<hr>
<h3>Ordini</h3>
<div id="orderStatus"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCW2MF4P8D9lYtQML-ZwZPbjF-MDIOHIC4",
  authDomain: "sushi-web-54e9b.firebaseapp.com",
  projectId: "sushi-web-54e9b",
  storageBucket: "sushi-web-54e9b.firebasestorage.app",
  messagingSenderId: "1023587576077",
  appId: "1:1023587576077:web:1024f53b1895b133556844"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const menuData = {

"Bevande":[
{name:"Acqua Naturale",price:2},
{name:"Acqua Frizzante",price:2}
],

"Antipasti":[
{name:"Nuvole di Drago",price:3},
{name:"Gyoza",price:5},
{name:"Involtini Primavera",price:4}
],

"Nigiri":[
{name:"Nigiri Salmone",price:6},
{name:"Nigiri Tonno",price:6}
],

"Sashimi":[
{name:"Sashimi Salmone",price:8},
{name:"Sashimi Tonno",price:8}
],

"Uramaki":[
{name:"Uramaki Tonno",price:10},
{name:"Uramaki Tonno e Fragole",price:11},
{name:"Uramaki Tonno e Mango",price:11},
{name:"Uramaki Salmone",price:10},
{name:"Uramaki Salmone e Fragole",price:11},
{name:"Uramaki Salmone e Mango",price:11}
],

"Speciale":[
{name:"Sushi Cake",price:18},
{name:"Tartare di Tonno",price:14},
{name:"Tartare di Salmone",price:14}
],

"Hosomaki":[
{name:"Hosomaki Tonno",price:7},
{name:"Hosomaki Tonno e Mango",price:8},
{name:"Hosomaki Tonno e Fragola",price:8},
{name:"Hosomaki Salmone",price:7},
{name:"Hosomaki Salmone e Mango",price:8},
{name:"Hosomaki Salmone e Fragola",price:8}
],

"Salse":[
{name:"Salsa Teriyaki",price:1},
{name:"Philadelphia",price:1}
],

"Spaghetti":[
{name:"Spaghetti di Soia",price:7},
{name:"Spaghetti di Soia e Verdure",price:8}
]

};

let cart=[];
const menuDiv=document.getElementById("menu");

Object.keys(menuData).forEach(section=>{
const sectionDiv=document.createElement("div");
sectionDiv.className="section";
sectionDiv.innerHTML=`<h2>${section}</h2><div class="grid"></div>`;
menuDiv.appendChild(sectionDiv);

const grid=sectionDiv.querySelector(".grid");

menuData[section].forEach(dish=>{
const div=document.createElement("div");
div.className="item";
div.innerHTML=`
<h4>${dish.name}</h4>
<p>€${dish.price}</p>
<button class="minus" onclick="changeQty('${dish.name}',${dish.price},-1)">-</button>
<button class="plus" onclick="changeQty('${dish.name}',${dish.price},1)">+</button>
`;
grid.appendChild(div);
});
});

window.changeQty=function(name,price,delta){
let item=cart.find(i=>i.name===name);
if(!item && delta>0){
cart.push({name,price,qty:1});
}else if(item){
item.qty+=delta;
if(item.qty<=0){
cart=cart.filter(i=>i.name!==name);
}
}
updateCart();
}

function updateCart(){
const list=document.getElementById("cartList");
const totalEl=document.getElementById("total");
list.innerHTML="";
let total=0;
cart.forEach(item=>{
total+=item.price*item.qty;
list.innerHTML+=`${item.name} x${item.qty}<br>`;
});
totalEl.innerText=total;
}

window.sendOrder=async function(){
if(cart.length===0){alert("Carrello vuoto");return;}
await addDoc(collection(db,"orders"),{
items:cart.map(i=>({name:i.name,qty:i.qty,ready:false})),
total:cart.reduce((sum,i)=>sum+i.price*i.qty,0),
time:new Date()
});
cart=[];
alert("Ordine inviato!");
}

const orderStatus=document.getElementById("orderStatus");

onSnapshot(collection(db,"orders"),snapshot=>{
orderStatus.innerHTML="";
snapshot.forEach(doc=>{
const data=doc.data();
let itemsHTML="";
data.items.forEach(item=>{
itemsHTML+=`
<div>
${item.name} x${item.qty} -
<span class="${item.ready?'pronto':'preparazione'}">
${item.ready?"PRONTO":"In preparazione"}
</span>
</div>`;
});
orderStatus.innerHTML+=`
<div class="order-box">
${itemsHTML}
<strong>Totale €${data.total}</strong>
</div>`;
});
});
</script>

</body>
</html>
