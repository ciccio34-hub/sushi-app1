<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu Sushi</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0; padding: 0;
    background: #f5f5f5;
  }
  h2 { text-align: center; margin: 20px 0; }
  .section {
    margin: 20px;
  }
  .items-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    justify-content: center;
  }
  .item-card {
    position: relative;
    width: 200px;
    height: 200px;
    background-size: cover;
    background-position: center;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    color: #fff;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  }
  .item-overlay {
    background: rgba(0,0,0,0.5);
    padding: 10px;
    text-align: center;
  }
  .item-overlay h3 { margin: 0; font-size: 16px; }
  .item-overlay p { margin: 5px 0 0 0; font-weight: bold; }
  .quantity-controls {
    display: flex;
    justify-content: center;
    margin-top: 5px;
  }
  .quantity-controls button {
    width: 30px; height: 30px; margin: 0 5px;
    font-size: 18px; font-weight: bold;
    border: none; border-radius: 5px;
    background: #fff; color: #333; cursor: pointer;
  }
  #cart {
    margin: 20px auto; max-width: 600px;
    background: #fff; padding: 15px; border-radius: 12px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  }
  .cart-item {
    display: flex; justify-content: space-between;
    margin-bottom: 10px; padding-bottom: 5px;
    border-bottom: 1px solid #ddd;
  }
  .cart-item button {
    margin-left: 5px; cursor: pointer; padding: 2px 5px;
  }
  #send-order {
    display: block; margin: 15px auto; padding: 10px 20px;
    background: gold; color: #333; font-weight: bold;
    border: none; border-radius: 8px; cursor: pointer;
  }
  .kitchen-order {
    display: flex; justify-content: space-between; margin: 5px 0;
    padding: 5px; background: #eee; border-radius: 5px;
  }
  .kitchen-order button { margin-left: 5px; }
</style>
</head>
<body>

<h2>I tuoi ordini</h2>

<div id="menu"></div>

<div id="cart">
  <h3>Carrello</h3>
  <div id="cart-items"></div>
  <button id="send-order">Invia ordine</button>
</div>

<h2>Cucina</h2>
<div id="kitchen"></div>

<script>
const menuData = [
  {section:"Roll con Alga e Philadelphia", items:[
    {name:"Salmone",price:7, image_bg:"https://i.imgur.com/lKx0ZfQ.jpeg", options: [{name: "Salsa piccante", price: 0.5}, {name: "Extra avocado", price: 1}, {name: "Senza cetriolo", price: 0}]},
    {name:"Salmone e Fragole",price:8, image_bg:"https://i.imgur.com/iARzy7k.jpeg"},
    {name:"Salmone e Mango",price:8, image_bg:"https://i.imgur.com/Ddfm69F.jpeg"},
    {name:"Tonno",price:7, image_bg:"https://i.imgur.com/dpIpTNX.jpeg", options: [{name: "Salsa piccante", price: 0.5}, {name: "Extra avocado", price: 1}, {name: "Senza cetriolo", price: 0}]},
    {name:"Tonno e Fragole",price:8, image_bg:"https://i.imgur.com/RuQiyQn.jpeg"},
    {name:"Tonno e Mango",price:8, image_bg:"https://i.imgur.com/DUzDblj.jpeg"},
    {name:"Gambero",price:7, image_bg:"https://i.imgur.com/YWcgyV5.jpeg"},
    {name:"Gambero e Fragole",price:8, image_bg:"https://i.imgur.com/KbvRJ6Q.jpeg"},
    {name:"Gambero e Mango",price:8, image_bg:"https://i.imgur.com/Del3aoz.jpeg"}
  ]},
  {section:"Roll Senza Alga con Philadelphia", items:[
    {name:"Salmone",price:7.5, image_bg:"https://i.imgur.com/lKx0ZfQ.jpeg"},
    {name:"Salmone e Fragole",price:8.5, image_bg:"https://i.imgur.com/iARzy7k.jpeg"},
    {name:"Salmone e Mango",price:8.5, image_bg:"https://i.imgur.com/Ddfm69F.jpeg"},
    {name:"Tonno",price:7.5, image_bg:"https://i.imgur.com/dpIpTNX.jpeg"},
    {name:"Tonno e Fragole",price:8.5, image_bg:"https://i.imgur.com/RuQiyQn.jpeg"},
    {name:"Tonno e Mango",price:8.5, image_bg:"https://i.imgur.com/DUzDblj.jpeg"},
    {name:"Gambero",price:7.5, image_bg:"https://i.imgur.com/YWcgyV5.jpeg"},
    {name:"Gambero e Fragole",price:8.5, image_bg:"https://i.imgur.com/KbvRJ6Q.jpeg"},
    {name:"Gambero e Mango",price:8.5, image_bg:"https://i.imgur.com/Del3aoz.jpeg"}
  ]},
  {section:"Roll con Alga Senza Philadelphia", items:[
    {name:"Salmone",price:6, image_bg:"https://i.imgur.com/lKx0ZfQ.jpeg"},
    {name:"Salmone e Fragole",price:7, image_bg:"https://i.imgur.com/iARzy7k.jpeg"},
    {name:"Salmone e Mango",price:7, image_bg:"https://i.imgur.com/Ddfm69F.jpeg"},
    {name:"Tonno",price:6, image_bg:"https://i.imgur.com/dpIpTNX.jpeg"},
    {name:"Tonno e Fragole",price:7, image_bg:"https://i.imgur.com/RuQiyQn.jpeg"},
    {name:"Tonno e Mango",price:7, image_bg:"https://i.imgur.com/DUzDblj.jpeg"},
    {name:"Gambero",price:6, image_bg:"https://i.imgur.com/YWcgyV5.jpeg"},
    {name:"Gambero e Fragole",price:7, image_bg:"https://i.imgur.com/KbvRJ6Q.jpeg"},
    {name:"Gambero e Mango",price:7, image_bg:"https://i.imgur.com/Del3aoz.jpeg"}
  ]},
  {section:"Roll Senza Alga Senza Philadelphia", items:[
    {name:"Salmone",price:6.5, image_bg:"https://i.imgur.com/lKx0ZfQ.jpeg"},
    {name:"Salmone e Fragole",price:7.5, image_bg:"https://i.imgur.com/iARzy7k.jpeg"},
    {name:"Salmone e Mango",price:7.5, image_bg:"https://i.imgur.com/Ddfm69F.jpeg"},
    {name:"Tonno",price:6.5, image_bg:"https://i.imgur.com/dpIpTNX.jpeg"},
    {name:"Tonno e Fragole",price:7.5, image_bg:"https://i.imgur.com/RuQiyQn.jpeg"},
    {name:"Tonno e Mango",price:7.5, image_bg:"https://i.imgur.com/DUzDblj.jpeg"},
    {name:"Gambero",price:6.5, image_bg:"https://i.imgur.com/YWcgyV5.jpeg"},
    {name:"Gambero e Fragole",price:7.5, image_bg:"https://i.imgur.com/KbvRJ6Q.jpeg"},
    {name:"Gambero e Mango",price:7.5, image_bg:"https://i.imgur.com/Del3aoz.jpeg"}
  ]}
];

const menuContainer = document.getElementById('menu');
const cartContainer = document.getElementById('cart-items');
const kitchenContainer = document.getElementById('kitchen');

let cart = [];
let kitchenOrders = [];

function renderMenu() {
  menuData.forEach(section => {
    const sectionDiv = document.createElement('div');
    sectionDiv.classList.add('section');
    sectionDiv.innerHTML = `<h2>${section.section}</h2>`;
    const itemsGrid = document.createElement('div');
    itemsGrid.classList.add('items-grid');

    section.items.forEach(item => {
      const itemCard = document.createElement('div');
      itemCard.classList.add('item-card');
      itemCard.style.backgroundImage = `url(${item.image_bg})`;

      const overlay = document.createElement('div');
      overlay.classList.add('item-overlay');
      overlay.innerHTML = `<h3>${item.name}</h3><p>€${item.price.toFixed(2)}</p>`;

      const controls = document.createElement('div');
      controls.classList.add('quantity-controls');
      const minus = document.createElement('button');
      minus.textContent = '-';
      const plus = document.createElement('button');
      plus.textContent = '+';
      let qty = 0;

      minus.onclick = () => {
        if(qty>0) { qty--; updateCart(item, qty); controls.querySelector('span').textContent = qty; }
      };
      plus.onclick = () => { qty++; updateCart(item, qty); controls.querySelector('span').textContent = qty; };

      const qtyDisplay = document.createElement('span');
      qtyDisplay.textContent = qty;

      controls.appendChild(minus);
      controls.appendChild(qtyDisplay);
      controls.appendChild(plus);

      overlay.appendChild(controls);
      itemCard.appendChild(overlay);
      itemsGrid.appendChild(itemCard);
    });

    sectionDiv.appendChild(itemsGrid);
    menuContainer.appendChild(sectionDiv);
  });
}

function updateCart(item, qty) {
  const index = cart.findIndex(i => i.name === item.name);
  if(qty===0) {
    if(index!==-1) cart.splice(index,1);
  } else {
    if(index===-1) cart.push({...item, qty});
    else cart[index].qty = qty;
  }
  renderCart();
}

function renderCart() {
  cartContainer.innerHTML = '';
  cart.forEach(item => {
    const div = document.createElement('div');
    div.classList.add('cart-item');
    div.innerHTML = `${item.name} x ${item.qty} (€${(item.price*item.qty).toFixed(2)})`;
    cartContainer.appendChild(div);
  });
}

document.getElementById('send-order').onclick = () => {
  cart.forEach(item => {
    kitchenOrders.push({...item, status:'In preparazione'});
  });
  cart = [];
  renderCart();
  renderKitchen();
};

function renderKitchen() {
  kitchenContainer.innerHTML = '';
  kitchenOrders.forEach((order, idx) => {
    const div = document.createElement('div');
    div.classList.add('kitchen-order');
    div.innerHTML = `${order.name} x ${order.qty} - ${order.status}`;
    const btnStatus = document.createElement('button');
    btnStatus.textContent = order.status==='In preparazione'?'Pronto':'In preparazione';
    btnStatus.onclick = () => { order.status = btnStatus.textContent; renderKitchen(); };

    const btnDelete = document.createElement('button');
    btnDelete.textContent = 'Elimina';
    btnDelete.onclick = () => { kitchenOrders.splice(idx,1); renderKitchen(); };

    div.appendChild(btnStatus);
    div.appendChild(btnDelete);
    kitchenContainer.appendChild(div);
  });
}

renderMenu();
</script>

</body>
</html>
