<!DOCTYPE html>
<html>
<head>
  <title>Menu Sushi</title>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #1f4037, #99f2c8);
      color: white;
    }

    header {
      text-align: center;
      padding: 20px;
      font-size: 32px;
      font-weight: bold;
    }

    .container {
      display: flex;
      padding: 20px;
      gap: 20px;
    }

    .menu { flex: 3; }

    .section { margin-bottom: 30px; }

    .section h2 {
      border-bottom: 2px solid white;
      padding-bottom: 5px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
      gap: 15px;
      margin-top: 15px;
    }

    .item {
      background: white;
      color: black;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
    }

    button {
      background: #2e8b57;
      border: none;
      color: white;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .cart {
      flex: 1;
      background: rgba(0,0,0,0.4);
      padding: 20px;
      border-radius: 15px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .order-box {
      background: rgba(255,255,255,0.1);
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
    }

    /* ANIMAZIONE PRONTO */
    @keyframes glow {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .pronto {
      color: lime;
      font-weight: bold;
      animation: glow 0.6s ease-in-out;
    }

    .preparazione {
      color: red;
      font-weight: bold;
    }

    .counter {
      margin-top: 5px;
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>
<body>

<header>🍣 MENU SUSHI</header>

<div class="container">
  <div class="menu" id="menu"></div>

  <div class="cart">
    <h3>🛒 Carrello</h3>
    <div id="cartList"></div>
    <h4>Totale: €<span id="total">0</span></h4>
    <button onclick="sendOrder()">Invia Ordine</button>

    <hr>
    <h3>📋 Ordini Effettuati</h3>
    <div id="orderStatus"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "TUO_API_KEY",
  authDomain: "TUO_AUTH_DOMAIN",
  projectId: "TUO_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const menuData = {
  "Antipasti": [
    {name:"Edamame", price:4},
    {name:"Gyoza", price:5}
  ],
  "Nigiri": [
    {name:"Nigiri Salmone", price:6},
    {name:"Nigiri Tonno", price:6}
  ],
  "Roll": [
    {name:"California Roll", price:9},
    {name:"Dragon Roll", price:13}
  ]
};

let cart = [];
const menuDiv = document.getElementById("menu");

Object.keys(menuData).forEach(section=>{
  const sectionDiv=document.createElement("div");
  sectionDiv.className="section";
  sectionDiv.innerHTML=`<h2>${section}</h2><div class="grid"></div>`;
  menuDiv.appendChild(sectionDiv);

  const grid=sectionDiv.querySelector(".grid");

  menuData[section].forEach(dish=>{
    const div=document.createElement("div");
    div.className="item";
    div.innerHTML=`
      <h4>${dish.name}</h4>
      <p>€${dish.price}</p>
      <button onclick="changeQty('${dish.name}',${dish.price},-1)">➖</button>
      <button onclick="changeQty('${dish.name}',${dish.price},1)">➕</button>
    `;
    grid.appendChild(div);
  });
});

window.changeQty=function(name,price,delta){
  let item=cart.find(i=>i.name===name);

  if(!item && delta>0){
    cart.push({name,price,qty:1});
  }else if(item){
    item.qty+=delta;
    if(item.qty<=0){
      cart=cart.filter(i=>i.name!==name);
    }
  }
  updateCart();
}

function updateCart(){
  const list=document.getElementById("cartList");
  const totalEl=document.getElementById("total");

  list.innerHTML="";
  let total=0;

  cart.forEach(item=>{
    total+=item.price*item.qty;
    list.innerHTML+=`<div>${item.name} x${item.qty}</div>`;
  });

  totalEl.innerText=total;
}

window.sendOrder=async function(){
  if(cart.length===0){
    alert("Carrello vuoto");
    return;
  }

  await addDoc(collection(db,"orders"),{
    items: cart.map(i=>({name:i.name,qty:i.qty,ready:false})),
    total:cart.reduce((sum,i)=>sum+i.price*i.qty,0),
    time:new Date()
  });

  alert("Ordine inviato!");
  cart=[];
  location.reload();
}

const orderStatus=document.getElementById("orderStatus");

onSnapshot(collection(db,"orders"), snapshot=>{
  orderStatus.innerHTML="";

  snapshot.forEach(doc=>{
    const data=doc.data();

    let readyCount=0;
    let totalItems=data.items.length;

    let itemsHTML="";
    data.items.forEach(item=>{
      if(item.ready) readyCount++;

      itemsHTML+=`
        <div>
          • ${item.name} x${item.qty} -
          <span class="${item.ready ? 'pronto' : 'preparazione'}">
            ${item.ready ? "PRONTO" : "In preparazione"}
          </span>
        </div>
      `;
    });

    orderStatus.innerHTML+=`
      <div class="order-box">
        ${itemsHTML}
        <div class="counter">
          ${readyCount} / ${totalItems} piatti pronti
        </div>
        <strong>Totale: €${data.total}</strong>
      </div>
    `;
  });
});
</script>

</body>
</html>
