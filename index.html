<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sushi</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#000000,#1a1a1a,#2a0000);
color:white;
}

header{
text-align:center;
padding:30px;
font-size:50px;
font-weight:bold;
letter-spacing:5px;
color:#d4af37;
border-bottom:2px solid #d4af37;
}

.container{
display:flex;
padding:20px;
gap:30px;
}

.menu{flex:3;}

.section{
margin-bottom:40px;
}

.section h2{
color:#d4af37;
margin-bottom:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

.item{
background:#111;
padding:15px;
border-radius:10px;
text-align:center;
border:1px solid #d4af37;
transition:0.3s;
}

.item:hover{
transform:scale(1.05);
}

button{
padding:5px 12px;
margin:5px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.plus{background:#d4af37;color:black;}
.minus{background:#444;color:white;}

.cart{
flex:1;
background:#111;
padding:20px;
border-radius:10px;
border:1px solid #d4af37;
}

.order-btn{
margin-top:15px;
width:100%;
padding:10px;
background:#d4af37;
color:black;
font-weight:bold;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<header>SUSHI</header>

<div class="container">
<div class="menu" id="menu"></div>

<div class="cart">
<h3>Carrello</h3>
<div id="cartItems"></div>
<div>Totale: €<span id="total">0</span></div>
<button class="order-btn" onclick="sendOrder()">Invia Ordine</button>
</div>
</div>

<script>

function generateRolls(priceBase){
return [
{name:"Roll Salmone",price:priceBase},
{name:"Roll Salmone e Fragole",price:priceBase+1},
{name:"Roll Salmone e Mango",price:priceBase+1},
{name:"Roll Tonno",price:priceBase},
{name:"Roll Tonno e Fragole",price:priceBase+1},
{name:"Roll Tonno e Mango",price:priceBase+1},
{name:"Roll Gamberi",price:priceBase},
{name:"Roll Gamberi e Fragole",price:priceBase+1},
{name:"Roll Gamberi e Mango",price:priceBase+1}
];
}

const menuData = {

"Bevande":[
{name:"Acqua Naturale",price:2},
{name:"Acqua Frizzante",price:2}
],

"Antipasti":[
{name:"Nuvole di Drago",price:3},
{name:"Involtini Primavera",price:4},
{name:"Gyoza",price:5},
{name:"Ravioli di Gambero",price:6}
],

"Sashimi":[
{name:"Sashimi Salmone",price:8},
{name:"Sashimi Tonno",price:8}
],

"Nigiri":[
{name:"Nigiri Salmone",price:6},
{name:"Nigiri Tonno",price:6}
],

"Roll con Alga con Philadelphia": generateRolls(12),

"Roll con Alga senza Philadelphia": generateRolls(11),

"Roll senza Alga con Philadelphia": generateRolls(12),

"Roll senza Alga senza Philadelphia": generateRolls(11)

};

let cart=[];
const menuDiv=document.getElementById("menu");

Object.keys(menuData).forEach(section=>{
let sectionDiv=document.createElement("div");
sectionDiv.className="section";
sectionDiv.innerHTML=`<h2>${section}</h2><div class="grid"></div>`;
menuDiv.appendChild(sectionDiv);

let grid=sectionDiv.querySelector(".grid");

menuData[section].forEach(item=>{
let div=document.createElement("div");
div.className="item";
div.innerHTML=`
<h4>${item.name}</h4>
<p>€${item.price}</p>
<button class="minus" onclick="changeQty('${item.name}',${item.price},-1)">-</button>
<button class="plus" onclick="changeQty('${item.name}',${item.price},1)">+</button>
`;
grid.appendChild(div);
});
});

function changeQty(name,price,delta){
let found=cart.find(i=>i.name===name);

if(!found && delta>0){
cart.push({name,price,qty:1});
}
else if(found){
found.qty+=delta;
if(found.qty<=0){
cart=cart.filter(i=>i.name!==name);
}
}
updateCart();
}

function updateCart(){
let list=document.getElementById("cartItems");
let totalEl=document.getElementById("total");
list.innerHTML="";
let total=0;

cart.forEach(item=>{
total+=item.price*item.qty;
list.innerHTML+=`${item.name} x${item.qty}<br>`;
});

totalEl.innerText=total;
}

function sendOrder(){
if(cart.length===0){
alert("Carrello vuoto!");
return;
}
alert("Ordine inviato!");
cart=[];
updateCart();
}

</script>

</body>
</html>
