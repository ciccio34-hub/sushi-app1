<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sushi ORDINI</title>
<style>
body{margin:0;font-family:Arial;background:black;color:gold;display:flex}
.menu{flex:3;padding:20px;overflow:auto}
.cart{flex:1;background:#111;padding:20px}
button{background:gold;border:none;padding:5px 10px;cursor:pointer;margin:2px}
.order{background:#222;padding:10px;margin-top:10px;border-radius:6px}
</style>
</head>
<body>

<div class="menu">
<h2>Menu</h2>
<div>
Nigiri €5 <button onclick="add('Nigiri',5)">+</button> <button onclick="remove('Nigiri',5)">-</button>
</div>
<div>
Sashimi €7 <button onclick="add('Sashimi',7)">+</button> <button onclick="remove('Sashimi',7)">-</button>
</div>
<div>
Gyoza €4 <button onclick="add('Gyoza',4)">+</button> <button onclick="remove('Gyoza',4)">-</button>
</div>
</div>

<div class="cart">
<h2>Carrello</h2>
<div id="cart"></div>
<h3 id="total">Costo totale €0</h3>
<button onclick="sendOrder()">Invia ordine</button>
<h2>Ordini</h2>
<div id="orders"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyCW2MF4P8D9lYtQML-ZwZPbjF-MDIOHIC4",
authDomain:"sushi-web-54e9b.firebaseapp.com",
projectId:"sushi-web-54e9b",
storageBucket:"sushi-web-54e9b.firebasestorage.app",
messagingSenderId:"1023587576077",
appId:"1:1023587576077:web:1024f53b1895b133556844"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let cart={}, total=0;

window.add=(name,price)=>{
if(!cart[name]) cart[name]={qty:0,price:price};
cart[name].qty++;
total+=price;
updateCart();
};

window.remove=(name,price)=>{
if(!cart[name]) return;
cart[name].qty--;
total-=price;
if(cart[name].qty<=0) delete cart[name];
updateCart();
};

function updateCart(){
let html="";
Object.keys(cart).forEach(n=>{html+=`${n} x${cart[n].qty}<br>`});
document.getElementById("cart").innerHTML=html;
document.getElementById("total").innerText="Costo totale €"+total;
}

window.sendOrder=async()=>{
if(Object.keys(cart).length===0) return;
let items=[];
Object.keys(cart).forEach(n=>{
for(let i=0;i<cart[n].qty;i++){
items.push({name:n,status:"prep"});
}
});
await addDoc(collection(db,"orders"),{items:items,time:Date.now()});
cart={}; total=0; updateCart();
};

onSnapshot(collection(db,"orders"),snapshot=>{
let html="";
snapshot.forEach(doc=>{
let order=doc.data();
html+=`<div class="order">`;
order.items.forEach(item=>{
if(item.status==="ready"){
html+=`<div style="color:lime">${item.name} pronto</div>`;
}else{
html+=`<div style="color:orange">${item.name} in preparazione</div>`;
}
});
html+="</div>";
});
document.getElementById("orders").innerHTML=html;
});
</script>
</body>
</html>
