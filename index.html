<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sushi Order</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🍣 Sushi Order</h1>

<div id="menu">

<div class="item">
<h3>Salmon Nigiri</h3>
<p>€5</p>
<button onclick="addToCart('Salmon Nigiri',5)">Aggiungi</button>
</div>

<div class="item">
<h3>Tuna Roll</h3>
<p>€6</p>
<button onclick="addToCart('Tuna Roll',6)">Aggiungi</button>
</div>

<div class="item">
<h3>Sashimi</h3>
<p>€8</p>
<button onclick="addToCart('Sashimi',8)">Aggiungi</button>
</div>

</div>

<h2>Carrello</h2>
<ul id="cart"></ul>

<p id="total">Totale: €0</p>

<button onclick="sendOrder()">Invia Ordine</button>

<script src="script.js"></script>

</body>
</html>
