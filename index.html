<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sushi ORDINI</title>

<style>
body{margin:0;font-family:'Segoe UI';background:#000;color:#ffd700;}
header{display:flex;justify-content:space-between;padding:15px;background:#111;}
button{background:#ffd700;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;}

.container{display:flex;height:calc(100vh - 60px);}
.menu{flex:2;padding:20px;overflow:auto;}
.cart{flex:1;padding:20px;background:#111;border-left:2px solid #333;}

.section{margin-bottom:20px;}
.item{background:#222;padding:10px;margin:6px 0;border-radius:10px;display:flex;justify-content:space-between;}

.order{background:#222;padding:10px;margin:10px 0;border-radius:10px;}

.status-ready{color:#4caf50;}
.status-prep{color:orange;}
</style>
</head>

<body>

<header>
  <h1>🍣 Sushi</h1>
  <div>
    <button onclick="showPage('menu')">Menu</button>
    <button onclick="showPage('kitchen')">Cucina</button>
  </div>
</header>

<div id="menuPage" class="container">
  <div class="menu" id="menu"></div>

  <div class="cart">
    <h2>🛒 Carrello</h2>
    <div id="cart"></div>
    <h3 id="total">Totale €0</h3>
    <button onclick="sendOrder()">Invia Ordine</button>

    <h2>I tuoi ordini</h2>
    <div id="orders"></div>
  </div>
</div>

<div id="kitchenPage" style="display:none;padding:20px;">
  <h2>👨‍🍳 Cucina</h2>
  <div id="kitchenOrders"></div>
</div>

<audio id="gong" src="https://assets.mixkit.co/sfx/preview/mixkit-bell-notification-933.mp3"></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import { getFirestore,collection,addDoc,onSnapshot,updateDoc,doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"

const firebaseConfig={
apiKey:"AIzaSyCW2MF4P8D9lYtQML-ZwZPbjF-MDIOHIC4",
authDomain:"sushi-web-54e9b.firebaseapp.com",
projectId:"sushi-web-54e9b"
}

const app=initializeApp(firebaseConfig)
const db=getFirestore(app)

let cart={},total=0,lastReady=0,orders=[]

window.showPage=(p)=>{
document.getElementById("menuPage").style.display=p==="menu"?"flex":"none"
document.getElementById("kitchenPage").style.display=p==="kitchen"?"block":"none"
}

const menuData=[
{section:"Bevande",items:[{name:"Acqua naturale",price:1},{name:"Acqua frizzante",price:1}]},
{section:"Antipasti",items:[
{name:"Nuvole di drago",price:5},
{name:"Involtini primavera",price:4},
{name:"Gyoza",price:4},
{name:"Ravioli di gambero",price:5},
{name:"Spaghetti di riso con verdure",price:5}
]},
{section:"Sashimi",items:[
{name:"Sashimi salmone",price:7},
{name:"Sashimi tonno",price:7}
]},
{section:"Nigiri",items:[
{name:"Nigiri salmone",price:5},
{name:"Nigiri tonno",price:5}
]},
{section:"Roll",items:[
{name:"Roll salmone",price:6},
{name:"Roll tonno",price:6},
{name:"Roll gambero",price:6}
]}
]

function renderMenu(){
let html=""
menuData.forEach(s=>{
html+=`<div class="section"><h2>${s.section}</h2>`
s.items.forEach(i=>{
html+=`<div class="item">
<span>${i.name} €${i.price}</span>
<div>
<button onclick="addItem('${i.name}',${i.price})">+</button>
<button onclick="removeItem('${i.name}',${i.price})">-</button>
</div>
</div>`
})
html+="</div>"
})
document.getElementById("menu").innerHTML=html
}

window.addItem=(n,p)=>{
if(!cart[n])cart[n]={q:0,p}
cart[n].q++
total+=p
updateCart()
}

window.removeItem=(n,p)=>{
if(!cart[n])return
cart[n].q--
total-=p
if(cart[n].q<=0)delete cart[n]
updateCart()
}

function updateCart(){
let h=""
Object.keys(cart).forEach(n=>h+=`${n} x${cart[n].q}<br>`)
document.getElementById("cart").innerHTML=h
document.getElementById("total").innerText="Totale €"+total
}

window.sendOrder=async()=>{
if(Object.keys(cart).length==0)return alert("Carrello vuoto")

let items=[]
Object.keys(cart).forEach(n=>{
for(let i=0;i<cart[n].q;i++){
items.push({name:n,status:"prep"})
}
})

await addDoc(collection(db,"orders"),{items,time:Date.now()})

cart={}
total=0
updateCart()
}

onSnapshot(collection(db,"orders"),snap=>{
orders=[]
let ready=0

snap.forEach(d=>{
let data={id:d.id,...d.data()}
orders.push(data)
data.items.forEach(i=>{if(i.status==="ready")ready++})
})

if(ready>lastReady){
document.getElementById("gong").play()
}
lastReady=ready

renderOrders()
renderKitchen()
})

function renderOrders(){
let html=""
orders.forEach(o=>{
html+=`<div class="order">`
o.items.forEach(i=>{
html+=`<p>${i.name} - ${
i.status==="ready"
?'<span class="status-ready">Pronto</span>'
:'<span class="status-prep">In preparazione</span>'
}</p>`
})
html+="</div>"
})
document.getElementById("orders").innerHTML=html
}

function renderKitchen(){
let html=""
orders.forEach(o=>{
html+=`<div class="order">`
o.items.forEach((i,index)=>{
html+=`<p>${i.name} - ${i.status}
${i.status==="prep"
?`<button onclick="ready('${o.id}',${index})">Pronto</button>`
:""}
</p>`
})
html+="</div>"
})
document.getElementById("kitchenOrders").innerHTML=html
}

window.ready=async(id,index)=>{
let order=orders.find(o=>o.id===id)
order.items[index].status="ready"
await updateDoc(doc(db,"orders",id),{items:order.items})
}

renderMenu()
</script>

</body>
</html>
