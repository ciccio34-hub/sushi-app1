<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sushi ORDINI</title>

<style>

*{
box-sizing:border-box;
}

body{

margin:0;
font-family:'Segoe UI',sans-serif;

background:
radial-gradient(circle at top,#111,#000);

color:#ffd700;

}

/* HEADER */

header{

padding:20px;

background:
linear-gradient(90deg,#000,#111,#000);

border-bottom:1px solid #333;

box-shadow:0 5px 25px black;

}

header h1{

margin:0;

font-size:28px;

letter-spacing:2px;

text-align:center;

}

/* LAYOUT */

.container{

display:flex;

height:calc(100vh - 80px);

}

/* MENU */

.menu{

flex:2;

padding:25px;

overflow:auto;

}

/* SEZIONI */

.section{

margin-bottom:35px;

}

.section h2{

font-size:20px;

margin-bottom:15px;

border-left:5px solid #ffd700;

padding-left:12px;

}

/* GRIGLIA MENU */

.grid{

display:grid;

grid-template-columns:repeat(auto-fill,minmax(220px,1fr));

gap:14px;

}

/* CARD PIATTI */

.item{

background:

linear-gradient(145deg,#111,#1a1a1a);

border-radius:18px;

padding:18px;

display:flex;

flex-direction:column;

justify-content:space-between;

box-shadow:

0 10px 25px rgba(0,0,0,0.9);

transition:all .25s;

min-height:120px;

}

.item:hover{

transform:translateY(-5px) scale(1.02);

box-shadow:

0 15px 35px black;

}

/* NOME PIATTO */

.item-name{

font-size:15px;

margin-bottom:8px;

}

/* PREZZO */

.price{

font-size:14px;

opacity:.9;

}

/* BOTTONI */

.buttons{

margin-top:10px;

display:flex;

justify-content:flex-end;

}

.buttons button{

border:none;

margin-left:6px;

padding:7px 13px;

border-radius:9px;

font-weight:bold;

cursor:pointer;

background:#ffd700;

color:black;

transition:.2s;

}

.buttons button:hover{

background:#ffcc00;

transform:scale(1.05);

}

/* CARRELLO */

.cart{

flex:1;

padding:22px;

background:

linear-gradient(180deg,#111,#080808);

border-left:2px solid #333;

overflow:auto;

}

.cart h2{

margin-top:0;

margin-bottom:12px;

}

/* CARRELLO ITEM */

.cart-item{

display:flex;

justify-content:space-between;

padding:8px 0;

border-bottom:1px solid #333;

font-size:14px;

}

/* TOTALE */

.total{

font-size:20px;

margin-top:15px;

font-weight:bold;

}

/* BOTTONE ORDINE */

.order-btn{

margin-top:12px;

width:100%;

padding:14px;

border:none;

border-radius:14px;

background:#ffd700;

color:black;

font-size:16px;

font-weight:bold;

cursor:pointer;

transition:0.2s;

}

.order-btn:hover{

background:#ffcc00;

transform:scale(1.03);

}

/* ORDINI */

.order{

background:

linear-gradient(145deg,#111,#1a1a1a);

padding:14px;

border-radius:14px;

margin-top:14px;

box-shadow:0 6px 15px black;

}

.order p{

margin:6px 0;

}

/* STATUS */

.status-prep{

color:orange;

font-weight:bold;

}

.status-ready{

color:#4caf50;

font-weight:bold;

}

/* SCROLL */

::-webkit-scrollbar{

width:8px;

}

::-webkit-scrollbar-thumb{

background:#ffd700;

border-radius:10px;

}

::-webkit-scrollbar-track{

background:#111;

}

</style>

</head>

<body>

<header>

<h1>🍣 Sushi ORDINI</h1>

</header>

<div class="container">

<div class="menu" id="menu"></div>

<div class="cart">

<h2>🛒 Carrello</h2>

<div id="cart"></div>

<div class="total" id="total">Totale €0</div>

<button class="order-btn" onclick="sendOrder()">Invia Ordine</button>

<h2>I tuoi ordini</h2>

<div id="orders"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import { getFirestore,collection,addDoc,onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"

const firebaseConfig={

apiKey:"AIzaSyCW2MF4P8D9lYtQML-ZwZPbjF-MDIOHIC4",
authDomain:"sushi-web-54e9b.firebaseapp.com",
projectId:"sushi-web-54e9b",
storageBucket:"sushi-web-54e9b.firebasestorage.app",
messagingSenderId:"1023587576077",
appId:"1:1023587576077:web:1024f53b1895b133556844"

}

const app=initializeApp(firebaseConfig)

const db=getFirestore(app)

let cart={}
let total=0
let orders=[]

const menuData=[

{section:"Bevande",items:[

{name:"Acqua naturale",price:1},
{name:"Acqua frizzante",price:1}

]},

{section:"Antipasti",items:[

{name:"Nuvole di drago",price:5},
{name:"Involtini primavera",price:4},
{name:"Gyoza",price:4},
{name:"Ravioli di gambero",price:5},
{name:"Spaghetti di riso con verdure",price:5}

]},

{section:"Sashimi",items:[

{name:"Sashimi salmone",price:7},
{name:"Sashimi tonno",price:7}

]},

{section:"Nigiri",items:[

{name:"Nigiri salmone",price:5},
{name:"Nigiri tonno",price:5}

]},

{section:"Roll con alga e Philadelphia",items:[

{name:"Roll salmone",price:6},
{name:"Roll salmone e fragole",price:6},
{name:"Roll salmone e mango",price:6},
{name:"Roll tonno",price:6},
{name:"Roll tonno e fragole",price:6},
{name:"Roll tonno e mango",price:6},
{name:"Roll gambero",price:6},
{name:"Roll gambero e fragole",price:6},
{name:"Roll gambero e mango",price:6}

]},

{section:"Roll con alga senza Philadelphia",items:[

{name:"Roll salmone",price:5},
{name:"Roll salmone e fragole",price:5},
{name:"Roll salmone e mango",price:5},
{name:"Roll tonno",price:5},
{name:"Roll tonno e fragole",price:5},
{name:"Roll tonno e mango",price:5},
{name:"Roll gambero",price:5},
{name:"Roll gambero e fragole",price:5},
{name:"Roll gambero e mango",price:5}

]},

{section:"Roll senza alga con Philadelphia",items:[

{name:"Roll salmone",price:6},
{name:"Roll salmone e fragole",price:6},
{name:"Roll salmone e mango",price:6},
{name:"Roll tonno",price:6},
{name:"Roll tonno e fragole",price:6},
{name:"Roll tonno e mango",price:6},
{name:"Roll gambero",price:6},
{name:"Roll gambero e fragole",price:6},
{name:"Roll gambero e mango",price:6}

]},

{section:"Roll senza alga senza Philadelphia",items:[

{name:"Roll salmone",price:5},
{name:"Roll salmone e fragole",price:5},
{name:"Roll salmone e mango",price:5},
{name:"Roll tonno",price:5},
{name:"Roll tonno e fragole",price:5},
{name:"Roll tonno e mango",price:5},
{name:"Roll gambero",price:5},
{name:"Roll gambero e fragole",price:5},
{name:"Roll gambero e mango",price:5}

]}

]

function renderMenu(){

let html=""

menuData.forEach(section=>{

html+=`<div class="section"><h2>${section.section}</h2><div class="grid">`

section.items.forEach(item=>{

html+=`

<div class="item">

<div>

<div class="item-name">${item.name}</div>

<div class="price">€${item.price}</div>

</div>

<div class="buttons">

<button onclick="addItem('${item.name}',${item.price})">+</button>

<button onclick="removeItem('${item.name}',${item.price})">-</button>

</div>

</div>

`

})

html+="</div></div>"

})

document.getElementById("menu").innerHTML=html

}

window.addItem=(name,price)=>{

if(!cart[name]) cart[name]={qty:0,price}

cart[name].qty++

total+=price

updateCart()

}

window.removeItem=(name,price)=>{

if(!cart[name]) return

cart[name].qty--

total=Math.max(0,total-price)

if(cart[name].qty<=0) delete cart[name]

updateCart()

}

function updateCart(){

let html=""

Object.keys(cart).forEach(name=>{

let item=cart[name]

html+=`<div class="cart-item">

<span>${name} x${item.qty}</span>

<span>€${item.qty*item.price}</span>

</div>`

})

document.getElementById("cart").innerHTML=html

document.getElementById("total").innerText="Totale €"+total

}

window.sendOrder=async()=>{

if(Object.keys(cart).length===0){

alert("Carrello vuoto")

return

}

let items=[]

Object.keys(cart).forEach(name=>{

for(let i=0;i<cart[name].qty;i++){

items.push({name:name,status:"prep"})

}

})

await addDoc(collection(db,"orders"),{

items:items,

time:Date.now()

})

cart={}
total=0
updateCart()

}

onSnapshot(collection(db,"orders"),snapshot=>{

orders=[]

snapshot.forEach(d=>{

orders.push({id:d.id,...d.data()})

})

renderOrders()

})

function renderOrders(){

let html=""

orders.forEach(o=>{

html+=`<div class="order">`

o.items.forEach(item=>{

let status=item.status=="ready"

? `<span class="status-ready">Pronto</span>`

: `<span class="status-prep">In preparazione</span>`

html+=`<p>${item.name} - ${status}</p>`

})

html+="</div>"

})

document.getElementById("orders").innerHTML=html

}

renderMenu()

</script>

</body>
</html>
