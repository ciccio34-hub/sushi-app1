<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sushi ORDINI</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --dark-bg: #1c1c1c;
            --dark-surface: #2a2a2a;
            --accent-gold: #FFD700;
            --text-light: #f0f0f0;
            --border-color: #444444;
        }
        body {
            margin: 0;
            font-family: 'Open Sans', sans-serif;
            background: var(--dark-bg);
            color: var(--text-light);
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: var(--dark-surface);
        }
        header h1 {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            color: var(--accent-gold);
        }
        .container {
            display: flex;
            height: calc(100vh - 80px);
            padding: 20px;
            gap: 20px;
        }
        .menu-panel, .cart-panel {
            padding: 25px;
            overflow-y: auto;
            border-radius: 12px;
            background: var(--dark-surface);
        }
        .menu-panel {
            flex: 2;
        }
        .cart-panel {
            flex: 1;
        }
        .cart-panel h2 {
            color: var(--accent-gold);
            margin-bottom: 15px;
        }
        .grid-items {
            display: grid;
            grid-template-columns: repeat(auto-fill, 150px);
            gap: 12px;
        }
        .grid-item {
            background: var(--dark-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            position: relative;
        }
        .quantity-controls button {
            background: var(--accent-gold);
            border: none;
            padding: 6px 10px;
            border-radius: 6px;
            color: var(--dark-bg);
            cursor: pointer;
        }
        .item-count {
            position: absolute;
            top: 5px;
            right: 5px;
            background-color: var(--accent-gold);
            color: var(--dark-bg);
            border-radius: 50%;
            padding: 3px 8px;
            font-size: 12px;
            font-weight: bold;
            display: none;
        }
        .item-count.visible {
            display: block;
        }
        #cart-items {
            min-height: 100px;
            margin-bottom: 20px;
        }
        .send-order-button {
            width: 100%;
            padding: 12px 20px;
            background: var(--accent-gold); /* Cambiato qui */
            color: var(--dark-bg);
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1><i class="fas fa-sushi"></i> Sushi</h1>
</header>

<div class="container">
    <div class="menu-panel" id="menu">
        <div class="section" id="makis">
            <h2>Maki</h2>
            <div class="grid-items" id="maki-items"></div>
        </div>
        <div class="section" id="nigiris">
            <h2>Nigiri</h2>
            <div class="grid-items" id="nigiri-items"></div>
        </div>
    </div>
    <div class="cart-panel">
        <h2><i class="fas fa-shopping-cart"></i> Carrello</h2>
        <div id="cart-items"></div>
        <button class="send-order-button" onclick="sendOrder()">Invia Ordine</button> <!-- Pulsante oro -->
        <h3 id="total">Totale: €0</h3>
    </div>
</div>

<script>
    const cart = {};
    function addToCart(item) {
        if(cart[item]) cart[item]++;
        else cart[item] = 1;
        updateCart();
    }
    function removeFromCart(item) {
        if(cart[item]) {
            cart[item]--;
            if(cart[item] <= 0) delete cart[item];
        }
        updateCart();
    }
    function updateCart() {
        const cartItemsDiv = document.getElementById('cart-items');
        cartItemsDiv.innerHTML = '';
        let total = 0;
        for(const item in cart) {
            const div = document.createElement('div');
            div.textContent = `${item} x ${cart[item]}`;
            cartItemsDiv.appendChild(div);
            total += cart[item] * 5; // esempio prezzo 5€
        }
        document.getElementById('total').textContent = `Totale: €${total}`;
    }
    function sendOrder() {
        alert('Ordine inviato!');
        for(const item in cart) delete cart[item];
        updateCart();
    }
</script>

</body>
</html>
