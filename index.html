<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sushi</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#000000,#1a1a1a,#000000);
color:#f5f5f5;
overflow-x:hidden;
}

header{
text-align:center;
padding:30px;
font-size:48px;
font-weight:bold;
letter-spacing:4px;
color:#d4af37;
border-bottom:2px solid #d4af37;
}

.container{
display:flex;
padding:25px;
gap:30px;
}

.menu{flex:3;}

.section{
margin-bottom:40px;
}

.section h2{
color:#d4af37;
border-left:5px solid #d4af37;
padding-left:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
}

.item{
background:#111;
padding:15px;
border-radius:12px;
text-align:center;
border:1px solid #d4af37;
}

button{
padding:6px 12px;
border:none;
border-radius:6px;
cursor:pointer;
margin:4px;
font-weight:bold;
}

.plus{background:#d4af37;color:black;}
.minus{background:#444;color:white;}

.cart{
flex:1;
background:#111;
padding:20px;
border-radius:12px;
border:1px solid #d4af37;
max-height:90vh;
overflow-y:auto;
}
</style>
</head>

<body>

<header>SUSHI</header>

<div class="container">
<div class="menu" id="menu"></div>

<div class="cart">
<h3>Carrello</h3>
<div id="cartList"></div>
<h4>Totale €<span id="total">0</span></h4>
<button onclick="sendOrder()" class="plus">Invia Ordine</button>
</div>
</div>

<script>
const menuData = {

"Bevande":[
{name:"Acqua Naturale",price:2},
{name:"Acqua Frizzante",price:2}
],

"Antipasti":[
{name:"Nuvole di Drago",price:3},
{name:"Gyoza di Carne",price:5},
{name:"Gyoza di Gamberi",price:6},
{name:"Involtini Primavera",price:4}
],

"Nigiri":[
{name:"Nigiri Salmone",price:6},
{name:"Nigiri Tonno",price:6},
{name:"Nigiri Gamberi",price:6}
],

"Sashimi":[
{name:"Sashimi Salmone",price:8}
],

"Uramaki (senza alga)":[
{name:"Uramaki Salmone",price:10},
{name:"Uramaki Salmone e Fragole",price:11},
{name:"Uramaki Salmone e Mango",price:11},
{name:"Uramaki Tonno",price:10},
{name:"Uramaki Tonno e Fragole",price:11},
{name:"Uramaki Tonno e Mango",price:11}
],

"Uramaki (con alga)":[
{name:"Uramaki Salmone con Alga",price:10},
{name:"Uramaki Salmone e Fragole con Alga",price:11},
{name:"Uramaki Salmone e Mango con Alga",price:11},
{name:"Uramaki Tonno con Alga",price:10},
{name:"Uramaki Tonno e Fragole con Alga",price:11},
{name:"Uramaki Tonno e Mango con Alga",price:11}
],

"Hosomaki (senza alga)":[
{name:"Hosomaki Salmone",price:7},
{name:"Hosomaki Salmone e Mango",price:8},
{name:"Hosomaki Salmone e Fragola",price:8},
{name:"Hosomaki Tonno",price:7},
{name:"Hosomaki Tonno e Mango",price:8}
],

"Hosomaki (con alga)":[
{name:"Hosomaki Salmone con Alga",price:7},
{name:"Hosomaki Salmone e Mango con Alga",price:8},
{name:"Hosomaki Salmone e Fragola con Alga",price:8},
{name:"Hosomaki Tonno con Alga",price:7},
{name:"Hosomaki Tonno e Mango con Alga",price:8}
],

"Speciale":[
{name:"Sushi Cake",price:15},
{name:"Tartare di Salmone",price:14},
{name:"Tartare di Tonno",price:14}
],

"Spaghetti":[
{name:"Spaghetti di Soia",price:9},
{name:"Spaghetti di Soia e Verdure",price:10},
{name:"Spaghetti di Riso con Verdure",price:10}
],

"Dolci":[
{name:"Gelato",price:5}
]

};

let cart=[];
const menuDiv=document.getElementById("menu");

Object.keys(menuData).forEach(section=>{
const sectionDiv=document.createElement("div");
sectionDiv.className="section";
sectionDiv.innerHTML=`<h2>${section}</h2><div class="grid"></div>`;
menuDiv.appendChild(sectionDiv);
const grid=sectionDiv.querySelector(".grid");

menuData[section].forEach(dish=>{
const div=document.createElement("div");
div.className="item";
div.innerHTML=`
<h4>${dish.name}</h4>
<p>€${dish.price}</p>
<button class="minus" onclick="changeQty('${dish.name}',${dish.price},-1)">-</button>
<button class="plus" onclick="changeQty('${dish.name}',${dish.price},1)">+</button>
`;
grid.appendChild(div);
});
});

window.changeQty=function(name,price,delta){
let item=cart.find(i=>i.name===name);
if(!item && delta>0){
cart.push({name,price,qty:1});
}else if(item){
item.qty+=delta;
if(item.qty<=0){
cart=cart.filter(i=>i.name!==name);
}
}
updateCart();
}

function updateCart(){
const list=document.getElementById("cartList");
const totalEl=document.getElementById("total");
list.innerHTML="";
let total=0;
cart.forEach(item=>{
total+=item.price*item.qty;
list.innerHTML+=`${item.name} x${item.qty}<br>`;
});
totalEl.innerText=total;
}

function sendOrder(){
if(cart.length===0){alert("Carrello vuoto");return;}
alert("Ordine inviato!");
cart=[];
updateCart();
}
</script>

</body>
</html>
