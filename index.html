<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sushi Pro</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

header{
text-align:center;
padding:25px;
font-size:40px;
color:gold;
border-bottom:3px solid gold;
}

/* LAYOUT */

.container{
display:flex;
gap:25px;
padding:20px;
}

.menu{
width:70%;
}

.section{
margin-bottom:35px;
}

.section h2{
color:gold;
border-left:4px solid gold;
padding-left:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
gap:15px;
}

.item{
background:#1a1a1a;
padding:15px;
border-radius:12px;
border:1px solid gold;
text-align:center;
}

button{
padding:6px 12px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.plus{
background:gold;
color:black;
}

.order-btn{
background:gold;
padding:12px;
width:100%;
border:none;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

/* ORDINI */

.orders-box{
margin-top:20px;
border-top:2px solid gold;
padding-top:15px;
}

.kitchen-order{
border:2px solid gold;
padding:10px;
margin:10px 0;
border-radius:10px;
}

.ready{
color:lime;
font-weight:bold;
}

.pending{
color:red;
font-weight:bold;
}

</style>
</head>

<header>SUSHI</header>

<div class="container">

<div class="menu" id="menu"></div>

<div style="width:30%;background:#1a1a1a;padding:20px;border-radius:12px;border:1px solid gold;">

<h3>Carrello</h3>
<div id="cartItems"></div>
Totale €<span id="total">0</span>

<button class="order-btn" onclick="sendOrder()">
Invia Ordine
</button>

<h3>Ordini Cliente</h3>

</div>

<h3>Ordini Cucina</h3>

</div>

</div>
