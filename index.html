<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sushi ORDINI</title>
<style>
body { margin:0; font-family:'Segoe UI', sans-serif; background:#111; color:#ffd700; }
header{ display:flex; justify-content:space-between; align-items:center; padding:15px; background:#222; }
header h1{ margin:0; font-size:24px; }
header button{ margin-left:10px; padding:6px 12px; border:none; border-radius:6px; background:#ffd700; color:#000; cursor:pointer; font-weight:bold; }
.container{ display:flex; height:calc(100vh - 60px); }
.menu, .cart{ padding:20px; overflow:auto; border-radius:10px; }
.menu{ flex:2; background:#1a1a1a; margin-right:10px; }
.cart{ flex:1; background:#1a1a1a; border-left:2px solid #333; }
.section{ margin-bottom:25px; }
.section h2{ margin-bottom:10px; border-bottom:1px solid #ffd700; display:flex; align-items:center; }
.section h2 img{ width:40px; height:40px; margin-right:10px; border-radius:6px; object-fit:cover; }
.item{ display:flex; justify-content:space-between; align-items:center; background:#222; padding:10px; border-radius:10px; margin-bottom:8px; transition: transform 0.2s; }
.item:hover{ transform: scale(1.02); }
.item button{ background:#ffd700; border:none; padding:6px 10px; border-radius:6px; color:#000; cursor:pointer; }
.order{ background:#222; padding:10px; margin-top:10px; border-radius:8px; border:1px solid #333; transition: background 0.3s; }
.status-prep{ color:#ffa500; font-weight:bold; }
.status-ready{ color:#4caf50; font-weight:bold; }
#kitchenPage{ display:none; padding:20px; }
#kitchenPage .order{ margin-bottom:10px; }
</style>
</head>
<body>

<header>
  <h1>🍣 Sushi ORDINI</h1>
  <div>
    <button onclick="showPage('menu')">Menu</button>
    <button onclick="showPage('kitchen')">Cucina</button>
  </div>
</header>

<div id="menuPage" class="container">
  <div class="menu" id="menu"></div>
  <div class="cart">
    <h2>🛒 Carrello</h2>
    <div id="cart"></div>
    <h3 id="total">Totale €0</h3>
    <button onclick="sendOrder()">Invia Ordine</button>
    <h2>I tuoi ordini</h2>
    <div id="orders"></div>
  </div>
</div>

<div id="kitchenPage">
  <h2>👨‍🍳 Cucina</h2>
  <div id="kitchenOrders"></div>
</div>

<audio id="gong" src="https://assets.mixkit.co/sfx/preview/mixkit-bell-notification-933.mp3"></audio>

<script>
// Mostra Menu o Cucina
function showPage(page){
  document.getElementById("menuPage").style.display = page==="menu"?"flex":"none";
  document.getElementById("kitchenPage").style.display = page==="kitchen"?"block":"none";
}

// Menu e immagini per categoria
const menuData=[
{section:"Bevande",img:"https://i.imgur.com/xx1z5VJ.png", items:[{name:"Acqua naturale",price:1},{name:"Acqua frizzante",price:1}]},
{section:"Antipasti",img:"https://i.imgur.com/lY1gVjD.png", items:[
{name:"Nuvole di drago",price:5},{name:"Involtini primavera",price:4},
{name:"Gyoza",price:4},{name:"Ravioli di gambero",price:5},{name:"Spaghetti di riso con verdure",price:5}
]},
{section:"Sashimi",img:"https://i.imgur.com/EVz8q5a.png", items:[
{name:"Sashimi salmone",price:7},{name:"Sashimi tonno",price:7}
]},
{section:"Nigiri",img:"https://i.imgur.com/KzOVJbI.png", items:[
{name:"Nigiri salmone",price:5},{name:"Nigiri tonno",price:5}
]},
{section:"Roll",img:"https://i.imgur.com/o6zNw5r.png", items:[
{name:"Roll salmone",price:6},{name:"Roll tonno",price:6},{name:"Roll gambero",price:6}
]}
];

let cart={}, orders=[], lastReady=0, total=0;

function renderMenu(){
  let html="";
  menuData.forEach(section=>{
    html+=`<div class="section"><h2><img src="${section.img}">${section.section}</h2>`;
    section.items.forEach(item=>{
      html+=`<div class="item">
        <span>${item.name} €${item.price}</span>
        <div>
          <button onclick="addItem('${item.name}',${item.price})">+</button>
          <button onclick="removeItem('${item.name}',${item.price})">-</button>
        </div>
      </div>`;
    });
    html+="</div>";
  });
  document.getElementById("menu").innerHTML = html;
}

function addItem(name,price){
  if(!cart[name]) cart[name]={q:0,p:price};
  cart[name].q++;
  total+=price;
  updateCart();
}

function removeItem(name,price){
  if(!cart[name]) return;
  cart[name].q--;
  total-=price;
  if(cart[name].q<=0) delete cart[name];
  updateCart();
}

function updateCart(){
  let html="";
  Object.keys(cart).forEach(name=> html+=`${name} x ${cart[name].q}<br>`);
  document.getElementById("cart").innerHTML=html;
  document.getElementById("total").innerText = "Totale €"+total;
}

function sendOrder(){
  if(Object.keys(cart).length===0){ alert("Carrello vuoto"); return; }
  let items=[];
  Object.keys(cart).forEach(n=>{
    for(let i=0;i<cart[n].q;i++){
      items.push({name:n,status:"prep"});
    }
  });
  orders.push({items,time:Date.now()});
  cart={}; total=0;
  updateCart();
  renderOrders();
  renderKitchen();
}

// Render ordini cliente
function renderOrders(){
  let html="";
  orders.forEach(o=>{
    html+=`<div class="order">`;
    o.items.forEach(i=>{
      html+=`<p>${i.name} - <span class="${i.status==='ready'?'status-ready':'status-prep'}">${i.status==='ready'?'Pronto':'In preparazione'}</span></p>`;
    });
    html+=`</div>`;
  });
  document.getElementById("orders").innerHTML = html;
}

// Render cucina
function renderKitchen(){
  let html="";
  let readyCount=0;
  orders.forEach((o,oi)=>{
    html+=`<div class="order">`;
    o.items.forEach((i,ii)=>{
      html+=`<p>${i.name} - <span class="${i.status==='ready'?'status-ready':'status-prep'}">${i.status==='ready'?'Pronto':'In preparazione'}</span>`;
      if(i.status==='prep'){
        html+=` <button onclick="markReady(${oi},${ii})">Pronto</button>`;
      }
      html+=`</p>`;
      if(i.status==='ready') readyCount++;
    });
    html+=`</div>`;
  });
  if(readyCount>lastReady) document.getElementById("gong").play();
  lastReady=readyCount;
  document.getElementById("kitchenOrders").innerHTML = html;
}

function markReady(orderIndex,itemIndex){
  orders[orderIndex].items[itemIndex].status="ready";
  renderOrders();
  renderKitchen();
}

renderMenu();
</script>

</body>
</html>
