<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Sushi Ordini</title>

<script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>

<style>
body { background:#1c1c1c; color:white; font-family:sans-serif; }
button { padding:10px; margin:5px; cursor:pointer; }
</style>
</head>

<body>

<h1>🍣 Sushi Ordini</h1>

<div>
    <button onclick="addItem('Nigiri Salmone',5,'Nigiri')">Aggiungi Nigiri</button>
    <button onclick="addItem('Acqua',1,'Bevande')">Aggiungi Acqua</button>
</div>

<h2>Carrello</h2>
<div id="cart-items"></div>

<button onclick="sendOrder()">Invia Ordine</button>

<script>
// FIREBASE CONFIG
const firebaseConfig = {
    apiKey: "AIzaSyCuQrgfoRP79a6RxK2eFbFowaZySmLadmI",
    authDomain: "il-vero-sushi.firebaseapp.com",
    projectId: "il-vero-sushi",
    databaseURL: "https://il-vero-sushi-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const ordersRef = db.ref("orders");

let cart = {};
let total = 0;

// AGGIUNGI AL CARRELLO
function addItem(name, price, section) {
    if (!cart[name]) {
        cart[name] = { q: 0, p: price, section };
    }
    cart[name].q++;
    total += price;
    renderCart();
}

// MOSTRA CARRELLO
function renderCart() {
    let html = "";
    Object.keys(cart).forEach(k => {
        html += `<p>${k} x${cart[k].q}</p>`;
    });
    document.getElementById("cart-items").innerHTML = html;
}

// INVIO ORDINE (FIXATO)
async function sendOrder() {

    if (Object.keys(cart).length === 0) {
        alert("Carrello vuoto!");
        return;
    }

    let items = [];

    Object.keys(cart).forEach(k => {
        let item = cart[k];
        for (let i = 0; i < item.q; i++) {
            items.push({
                name: k,
                status: "prep",
                price: item.p,
                section: item.section
            });
        }
    });

    const order = {
        items: items,
        timestamp: Date.now(),
        total: total,
        isNew: true
    };

    console.log("Invio:", order);

    try {
        await ordersRef.push(order);

        cart = {};
        total = 0;
        renderCart();

        alert("✅ Ordine inviato!");

    } catch (e) {
        console.error(e);
        alert("❌ Errore: " + e.message);
    }
}
</script>

</body>
</html>
