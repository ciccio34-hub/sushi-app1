<!DOCTYPE html>
<html>
<head>
<title>Sushi Sistema Ordini</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

header{
background:#d32f2f;
color:white;
padding:15px;
text-align:center;
}

.container{
display:flex;
height:90vh;
}

/* MENU */

.menu{
width:60%;
padding:20px;
overflow:auto;
}

.item{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

/* CARRELLO */

.cart{
width:40%;
background:white;
padding:20px;
border-left:3px solid #ddd;
overflow:auto;
}

button{
padding:6px 10px;
border:none;
border-radius:6px;
background:#d32f2f;
color:white;
cursor:pointer;
margin:3px;
}

button:hover{
background:#b71c1c;
}

.order{
background:#fafafa;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ddd;
}

.status-wait{
color:gray;
}

.status-prep{
color:orange;
}

.status-ready{
color:green;
}

</style>
</head>

<body>

<header>
<h1>🍣 Sushi Sistema</h1>

<button onclick="cliente()">Cliente</button>
<button onclick="cucina()">Cucina</button>

</header>

<div id="clienteView" class="container">

<div class="menu" id="menu"></div>

<div class="cart">

<h2>🛒 Carrello</h2>

<div id="cartItems"></div>

<h3 id="total">Totale €0</h3>

<button onclick="sendOrder()">Invia ordine</button>

<h2>📋 Ordini</h2>

<div id="orders"></div>

</div>

</div>

<div id="cucinaView" style="display:none;padding:20px">

<h2>👨‍🍳 Cucina</h2>

<div id="kitchenOrders"></div>

</div>

<script>

let cart={}
let total=0
let orders=[]

let menuData=[
{name:"Salmon Nigiri",price:5},
{name:"Tuna Roll",price:6},
{name:"Sashimi",price:8},
{name:"Uramaki",price:7}
]

function cliente(){

document.getElementById("clienteView").style.display="flex"
document.getElementById("cucinaView").style.display="none"

renderMenu()
renderOrders()

}

function cucina(){

document.getElementById("clienteView").style.display="none"
document.getElementById("cucinaView").style.display="block"

renderKitchen()

}

function renderMenu(){

let html=""

menuData.forEach(item=>{

html+=`
<div class="item">

<h3>${item.name}</h3>
<p>€${item.price}</p>

<button onclick="add('${item.name}',${item.price})">➕</button>
<button onclick="removeItem('${item.name}',${item.price})">➖</button>

</div>
`

})

document.getElementById("menu").innerHTML=html

}

function add(name,price){

if(!cart[name]) cart[name]={qty:0,price:price}

cart[name].qty++

total+=price

updateCart()

}

function removeItem(name,price){

if(cart[name]){

cart[name].qty--

total-=price

if(cart[name].qty<=0) delete cart[name]

}

updateCart()

}

function updateCart(){

let html=""

Object.keys(cart).forEach(name=>{
html+=name+" x "+cart[name].qty+"<br>"
})

document.getElementById("cartItems").innerHTML=html
document.getElementById("total").innerText="Totale €"+total

}

function sendOrder(){

if(Object.keys(cart).length===0){
alert("Carrello vuoto")
return
}

let items=[]

Object.keys(cart).forEach(name=>{

for(let i=0;i<cart[name].qty;i++){

items.push({
name:name,
status:"wait"
})

}

})

orders.push({
items:items
})

cart={}
total=0

updateCart()

renderOrders()
renderKitchen()

}

function renderOrders(){

let html=""

orders.forEach((o,i)=>{

html+=`<div class="order">`

o.items.forEach(item=>{

let statusClass="status-wait"
let text="⚪ In attesa"

if(item.status=="prep"){
statusClass="status-prep"
text="🟡 In preparazione"
}

if(item.status=="ready"){
statusClass="status-ready"
text="🟢 Pronto"
}

html+=`
<p>
${item.name} - 
<span class="${statusClass}">
${text}
</span>
</p>
`

})

html+=`
<button onclick="deleteOrder(${i})">❌ Elimina ordine</button>
</div>
`

})

document.getElementById("orders").innerHTML=html

}

function renderKitchen(){

let html=""

orders.forEach((o,oi)=>{

html+=`<div class="order">`

o.items.forEach((item,ii)=>{

html+=`
<p>
${item.name}

<button onclick="setPrep(${oi},${ii})">Prep</button>
<button onclick="setReady(${oi},${ii})">Ready</button>
</p>
`

})

html+=`</div>`

})

document.getElementById("kitchenOrders").innerHTML=html

}

function setPrep(o,i){

orders[o].items[i].status="prep"

renderKitchen()
renderOrders()

}

function setReady(o,i){

orders[o].items[i].status="ready"

renderKitchen()
renderOrders()

}

function deleteOrder(i){

orders.splice(i,1)

renderOrders()
renderKitchen()

}

cliente()

</script>

</body>
</html>
