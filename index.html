<!DOCTYPE html>
<html>
<head>
<title>Sushi Sistema</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#ff6b6b,#ffb347);
text-align:center;
padding:20px;
}

button{
padding:8px 12px;
background:#e53935;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin:5px;
}

.menu{
background:white;
padding:15px;
margin:10px;
border-radius:10px;
display:inline-block;
width:220px;
}

#cart{
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
width:320px;
margin-left:auto;
margin-right:auto;
}

.order{
background:white;
padding:10px;
margin:10px;
border-radius:8px;
width:320px;
margin-left:auto;
margin-right:auto;
}

.qty{
font-weight:bold;
font-size:18px;
padding:0 6px;
}

</style>
</head>

<body>

<h1>🍣 Sushi Sistema Ordini</h1>

<button onclick="cliente()">Modalità Cliente</button>
<button onclick="cucina()">Modalità Cucina</button>

<div id="cliente"></div>
<div id="cucina" style="display:none"></div>

<script>

let cart={}
let total=0
let orders=[]

function cliente(){

document.getElementById("cliente").style.display="block"
document.getElementById("cucina").style.display="none"

renderCliente()

}

function cucina(){

document.getElementById("cliente").style.display="none"
document.getElementById("cucina").style.display="block"

renderCucina()

}

function renderCliente(){

document.getElementById("cliente").innerHTML=`

<div class="menu">
<h3>Salmon Nigiri</h3>
<p>€5</p>
<button onclick="add('Salmon Nigiri',5)">➕</button>
<span id="q_Salmon Nigiri" class="qty">0</span>
<button onclick="removeItem('Salmon Nigiri',5)">➖</button>
</div>

<div class="menu">
<h3>Tuna Roll</h3>
<p>€6</p>
<button onclick="add('Tuna Roll',6)">➕</button>
<span id="q_Tuna Roll" class="qty">0</span>
<button onclick="removeItem('Tuna Roll',6)">➖</button>
</div>

<div class="menu">
<h3>Sashimi</h3>
<p>€8</p>
<button onclick="add('Sashimi',8)">➕</button>
<span id="q_Sashimi" class="qty">0</span>
<button onclick="removeItem('Sashimi',8)">➖</button>
</div>

<div id="cart">
<h2>🛒 Carrello</h2>
<div id="items"></div>
<h3 id="total">Totale €0</h3>
<button onclick="sendOrder()">Invia ordine</button>
</div>

`

update()

}

function renderCucina(){

let html="<h2>👨‍🍳 Ordini cucina</h2>"

orders.forEach((o,i)=>{

html+=`
<div class="order">
${o.items}
<p><b>Totale €${o.total}</b></p>
<button onclick="complete(${i})">Ordine completato</button>
</div>
`

})

document.getElementById("cucina").innerHTML=html

}

function add(name,price){

if(!cart[name]) cart[name]={qty:0,price:price}

cart[name].qty++
total+=price

update()

}

function removeItem(name,price){

if(cart[name]){

cart[name].qty--
total-=price

if(cart[name].qty<=0) delete cart[name]

}

update()

}

function update(){

let html=""

Object.keys(cart).forEach(name=>{

let item=cart[name]

html+=name+" x "+item.qty+"<br>"

let q=document.getElementById("q_"+name)
if(q) q.innerText=item.qty

})

document.getElementById("items").innerHTML=html
document.getElementById("total").innerText="Totale €"+total

}

function sendOrder(){

if(Object.keys(cart).length===0){
alert("Carrello vuoto")
return
}

let orderHTML=""

Object.keys(cart).forEach(name=>{
orderHTML+=name+" x "+cart[name].qty+"<br>"
})

orders.push({
items:orderHTML,
total:total
})

cart={}
total=0

renderCliente()

}

function complete(i){

orders.splice(i,1)

renderCucina()

}

cliente()

</script>

</body>
</html>
