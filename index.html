<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sushi ORDINI</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
color:#ffd700;
overflow:hidden;
}

/* SFONDO ANIMATO */

body::before{

content:"";

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:
radial-gradient(circle at 20% 30%,#222,transparent 40%),
radial-gradient(circle at 80% 70%,#333,transparent 40%),
radial-gradient(circle at 50% 50%,#111,#000);

animation:bgmove 12s infinite alternate;

z-index:-1;

}

@keyframes bgmove{

0%{transform:scale(1)}
100%{transform:scale(1.2)}

}

/* HEADER */

header{
padding:20px;
background:rgba(0,0,0,0.6);
border-bottom:1px solid #333;
text-align:center;
}

header h1{
margin:0;
font-size:28px;
letter-spacing:2px;
}

/* LAYOUT */

.container{
display:flex;
height:calc(100vh - 80px);
}

/* MENU */

.menu{
flex:2;
padding:25px;
overflow:auto;
}

.section{
margin-bottom:35px;
}

.section h2{
border-left:5px solid #ffd700;
padding-left:10px;
margin-bottom:15px;
}

/* GRIGLIA */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:14px;
}

/* CARD */

.item{

background:rgba(20,20,20,0.9);

border-radius:18px;

padding:15px;

display:flex;

flex-direction:column;

box-shadow:0 10px 20px black;

transition:.25s;

}

.item:hover{

transform:translateY(-6px) scale(1.03);

}

/* IMMAGINE */

.item img{

width:100%;
height:120px;
object-fit:cover;

border-radius:12px;

margin-bottom:10px;

}

/* NOME */

.item-name{

font-size:15px;

margin-bottom:5px;

}

/* PREZZO */

.price{

font-size:14px;

opacity:.9;

}

/* BOTTONI */

.buttons{

margin-top:10px;

display:flex;

justify-content:flex-end;

}

.buttons button{

border:none;

padding:6px 12px;

margin-left:6px;

border-radius:8px;

font-weight:bold;

cursor:pointer;

background:#ffd700;

color:black;

}

.buttons button:hover{

background:#ffcc00;

}

/* CARRELLO */

.cart{

flex:1;

padding:22px;

background:rgba(0,0,0,0.6);

border-left:2px solid #333;

overflow:auto;

}

.cart-item{

display:flex;

justify-content:space-between;

padding:8px 0;

border-bottom:1px solid #333;

}

.total{

font-size:20px;

margin-top:10px;

}

.order-btn{

width:100%;

padding:14px;

margin-top:12px;

border:none;

border-radius:12px;

background:#ffd700;

font-weight:bold;

cursor:pointer;

}

/* ORDINI */

.order{

background:#111;

padding:12px;

border-radius:12px;

margin-top:12px;

}

.status-prep{
color:orange;
font-weight:bold;
}

.status-ready{
color:#4caf50;
font-weight:bold;
}

</style>

</head>

<body>

<header>
<h1>🍣 Sushi ORDINI</h1>
</header>

<div class="container">

<div class="menu" id="menu"></div>

<div class="cart">

<h2>🛒 Carrello</h2>

<div id="cart"></div>

<div class="total" id="total">Totale €0</div>

<button class="order-btn" onclick="sendOrder()">Invia Ordine</button>

<h2>I tuoi ordini</h2>

<div id="orders"></div>

</div>

</div>

<!-- SUONO -->

<audio id="readySound">
<source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3">
</audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import { getFirestore,collection,addDoc,onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"

const firebaseConfig={
apiKey:"AIzaSyCW2MF4P8D9lYtQML-ZwZPbjF-MDIOHIC4",
authDomain:"sushi-web-54e9b.firebaseapp.com",
projectId:"sushi-web-54e9b",
storageBucket:"sushi-web-54e9b.firebasestorage.app",
messagingSenderId:"1023587576077",
appId:"1:1023587576077:web:1024f53b1895b133556844"
}

const app=initializeApp(firebaseConfig)
const db=getFirestore(app)

let cart={}
let total=0
let orders=[]
let lastReadyCount=0

const sushiImg="https://images.unsplash.com/photo-1553621042-f6e147245754?w=400"

const menuData=[

{section:"Bevande",items:[
{name:"Acqua naturale",price:1},
{name:"Acqua frizzante",price:1}
]},

{section:"Antipasti",items:[
{name:"Nuvole di drago",price:5},
{name:"Involtini primavera",price:4},
{name:"Gyoza",price:4},
{name:"Ravioli di gambero",price:5},
{name:"Spaghetti di riso con verdure",price:5}
]},

{section:"Sashimi",items:[
{name:"Sashimi salmone",price:7},
{name:"Sashimi tonno",price:7}
]},

{section:"Nigiri",items:[
{name:"Nigiri salmone",price:5},
{name:"Nigiri tonno",price:5}
]},

{section:"Roll con alga e Philadelphia",items:[
{name:"Roll salmone",price:6},
{name:"Roll salmone e fragole",price:6},
{name:"Roll salmone e mango",price:6},
{name:"Roll tonno",price:6},
{name:"Roll tonno e fragole",price:6},
{name:"Roll tonno e mango",price:6},
{name:"Roll gambero",price:6},
{name:"Roll gambero e fragole",price:6},
{name:"Roll gambero e mango",price:6}
]},

{section:"Roll con alga senza Philadelphia",items:[
{name:"Roll salmone",price:5},
{name:"Roll salmone e fragole",price:5},
{name:"Roll salmone e mango",price:5},
{name:"Roll tonno",price:5},
{name:"Roll tonno e fragole",price:5},
{name:"Roll tonno e mango",price:5},
{name:"Roll gambero",price:5},
{name:"Roll gambero e fragole",price:5},
{name:"Roll gambero e mango",price:5}
]},

{section:"Roll senza alga con Philadelphia",items:[
{name:"Roll salmone",price:6},
{name:"Roll salmone e fragole",price:6},
{name:"Roll salmone e mango",price:6},
{name:"Roll tonno",price:6},
{name:"Roll tonno e fragole",price:6},
{name:"Roll tonno e mango",price:6},
{name:"Roll gambero",price:6},
{name:"Roll gambero e fragole",price:6},
{name:"Roll gambero e mango",price:6}
]},

{section:"Roll senza alga senza Philadelphia",items:[
{name:"Roll salmone",price:5},
{name:"Roll salmone e fragole",price:5},
{name:"Roll salmone e mango",price:5},
{name:"Roll tonno",price:5},
{name:"Roll tonno e fragole",price:5},
{name:"Roll tonno e mango",price:5},
{name:"Roll gambero",price:5},
{name:"Roll gambero e fragole",price:5},
{name:"Roll gambero e mango",price:5}
]}

]

function renderMenu(){

let html=""

menuData.forEach(section=>{

html+=`<div class="section"><h2>${section.section}</h2><div class="grid">`

section.items.forEach(item=>{

html+=`

<div class="item">

<img src="${sushiImg}">

<div class="item-name">${item.name}</div>

<div class="price">€${item.price}</div>

<div class="buttons">

<button onclick="addItem('${item.name}',${item.price})">+</button>

<button onclick="removeItem('${item.name}',${item.price})">-</button>

</div>

</div>

`

})

html+="</div></div>"

})

document.getElementById("menu").innerHTML=html

}

window.addItem=(name,price)=>{

if(!cart[name]) cart[name]={qty:0,price}

cart[name].qty++

total+=price

updateCart()

}

window.removeItem=(name,price)=>{

if(!cart[name]) return

cart[name].qty--

total=Math.max(0,total-price)

if(cart[name].qty<=0) delete cart[name]

updateCart()

}

function updateCart(){

let html=""

Object.keys(cart).forEach(name=>{

let item=cart[name]

html+=`<div class="cart-item">

<span>${name} x${item.qty}</span>

<span>€${item.qty*item.price}</span>

</div>`

})

document.getElementById("cart").innerHTML=html
document.getElementById("total").innerText="Totale €"+total

}

window.sendOrder=async()=>{

if(Object.keys(cart).length===0){
alert("Carrello vuoto")
return
}

let items=[]

Object.keys(cart).forEach(name=>{
for(let i=0;i<cart[name].qty;i++){
items.push({name:name,status:"prep"})
}
})

await addDoc(collection(db,"orders"),{
items:items,
time:Date.now()
})

cart={}
total=0
updateCart()

}

onSnapshot(collection(db,"orders"),snapshot=>{

orders=[]
let readyCount=0

snapshot.forEach(d=>{

let data=d.data()
orders.push({id:d.id,...data})

data.items.forEach(i=>{
if(i.status=="ready") readyCount++
})

})

if(readyCount>lastReadyCount){

document.getElementById("readySound").play()

}

lastReadyCount=readyCount

renderOrders()

})

function renderOrders(){

let html=""

orders.forEach(o=>{

html+=`<div class="order">`

o.items.forEach(item=>{

let status=item.status=="ready"
? `<span class="status-ready">Pronto</span>`
: `<span class="status-prep">In preparazione</span>`

html+=`<p>${item.name} - ${status}</p>`

})

html+="</div>"

})

document.getElementById("orders").innerHTML=html

}

renderMenu()

</script>

</body>
</html>
