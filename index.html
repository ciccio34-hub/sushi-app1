
<!DOCTYPE html>
<html>
<head>
  <title>Menu Sushi</title>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #134e5e, #71b280);
      color: white;
    }

    header {
      text-align: center;
      padding: 20px;
      font-size: 30px;
      font-weight: bold;
    }

    .container {
      display: flex;
      padding: 20px;
      gap: 20px;
    }

    .menu {
      flex: 3;
    }

    .item {
      background: white;
      color: black;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      margin-bottom: 15px;
    }

    button {
      background: #2e8b57;
      border: none;
      color: white;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .cart {
      flex: 1;
      background: rgba(0,0,0,0.4);
      padding: 20px;
      border-radius: 15px;
      max-height: 85vh;
      overflow-y: auto;
    }

    .order-box {
      background: rgba(255,255,255,0.1);
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<header>🍣 MENU SUSHI</header>

<div class="container">
  <div class="menu" id="menu"></div>

  <div class="cart">
    <h3>Carrello</h3>
    <div id="cartList"></div>
    <h4>Totale: €<span id="total">0</span></h4>
    <button onclick="sendOrder()">Invia Ordine</button>

    <hr>
    <h3>📋 Ordini Effettuati</h3>
    <div id="orderStatus"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCW2MF4P8D9lYtQML-ZwZPbjF-MDIOHIC4",
  authDomain: "sushi-web-54e9b.firebaseapp.com",
  projectId: "sushi-web-54e9b",
  storageBucket: "sushi-web-54e9b.firebasestorage.app",
  messagingSenderId: "1023587576077",
  appId: "1:1023587576077:web:1024f53b1895b133556844"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const dishes = [
  {name:"Nigiri Salmone", price:6},
  {name:"Nigiri Tonno", price:6},
  {name:"Uramaki Salmone", price:8},
  {name:"Dragon Roll", price:13},
  {name:"Ramen", price:11},
  {name:"Mochi Gelato", price:5}
];

let cart = [];

const menuDiv = document.getElementById("menu");

dishes.forEach(dish=>{
  const div=document.createElement("div");
  div.className="item";
  div.innerHTML=`
    <h4>${dish.name}</h4>
    <p>€${dish.price}</p>
    <button onclick="addToCart('${dish.name}',${dish.price})">Aggiungi</button>
  `;
  menuDiv.appendChild(div);
});

window.addToCart=function(name,price){
  let found=cart.find(i=>i.name===name);
  if(found){
    found.qty++;
  }else{
    cart.push({name,price,qty:1});
  }
  updateCart();
}

function updateCart(){
  const list=document.getElementById("cartList");
  const totalEl=document.getElementById("total");

  list.innerHTML="";
  let total=0;

  cart.forEach(item=>{
    total+=item.price*item.qty;
    list.innerHTML+=`<div>${item.name} x${item.qty}</div>`;
  });

  totalEl.innerText=total;
}

window.sendOrder=async function(){
  if(cart.length===0){
    alert("Carrello vuoto");
    return;
  }

  await addDoc(collection(db,"orders"),{
    items: cart.map(i=>({
      name:i.name,
      qty:i.qty,
      ready:false
    })),
    total:cart.reduce((sum,i)=>sum+i.price*i.qty,0),
    time:new Date()
  });

  alert("Ordine inviato!");
  cart=[];
  location.reload();
}

const orderStatus=document.getElementById("orderStatus");

onSnapshot(collection(db,"orders"), snapshot=>{
  orderStatus.innerHTML="";

  snapshot.forEach(doc=>{
    const data=doc.data();

    let itemsHTML="";
    data.items.forEach(item=>{
      itemsHTML+=`<div>• ${item.name} x${item.qty} - ${item.ready ? "PRONTO" : "In preparazione"}</div>`;
    });

    orderStatus.innerHTML+=`
      <div class="order-box">
        ${itemsHTML}
        <strong>Totale: €${data.total}</strong>
      </div>
    `;
  });
});
</script>

</body>
</html>
