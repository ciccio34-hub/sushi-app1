<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sushi</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#000,#111,#332200);
color:white;
}

h1{
text-align:center;
color:gold;
}

.container{
display:flex;
}

.menu{
width:60%;
padding:20px;
}

.cart{
width:40%;
background:#111;
padding:20px;
}

.item{
display:flex;
justify-content:space-between;
background:#222;
padding:10px;
margin:5px;
border-radius:5px;
}

button{
background:gold;
border:none;
padding:4px 8px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>🍣 Sushi</h1>

<div class="container">

<div class="menu" id="menu"></div>

<div class="cart">

<h2>Carrello</h2>

<div id="carrello"></div>

<br>

<button onclick="inviaOrdine()">Invia ordine</button>

<h2>Stato ordini</h2>

<div id="ordini"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyCW2MF4P8D9lYtQML-ZwZPbjF-MDIOHIC4",
authDomain: "sushi-web-54e9b.firebaseapp.com",
projectId: "sushi-web-54e9b",
storageBucket: "sushi-web-54e9b.firebasestorage.app",
messagingSenderId: "1023587576077",
appId: "1:1023587576077:web:1024f53b1895b133556844"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const menu = [
"Nuvole di drago",
"Involtini primavera",
"Gyoza",
"Ravioli di gambero",
"Sashimi salmone",
"Sashimi tonno",
"Nighiri salmone",
"Nighiri tonno",
"Roll salmone",
"Roll salmone mango",
"Roll salmone fragole",
"Roll tonno",
"Roll tonno mango",
"Roll tonno fragole",
"Roll gamberi",
"Roll gamberi mango",
"Roll gamberi fragole",
"Gelato",
"Acqua naturale",
"Acqua frizzante"
];

let cart={};

const menuDiv=document.getElementById("menu");

menu.forEach(p=>{

const div=document.createElement("div");

div.className="item";

div.innerHTML=`
${p}

<div>

<button onclick="meno('${p}')">-</button>

<span id="${p}">0</span>

<button onclick="piu('${p}')">+</button>

</div>
`;

menuDiv.appendChild(div);

});

window.piu=function(nome){

if(!cart[nome]) cart[nome]=0;

cart[nome]++;

document.getElementById(nome).innerText=cart[nome];

aggiorna();

}

window.meno=function(nome){

if(!cart[nome]) return;

cart[nome]--;

if(cart[nome]<=0) delete cart[nome];

document.getElementById(nome).innerText=cart[nome]||0;

aggiorna();

}

function aggiorna(){

const c=document.getElementById("carrello");

c.innerHTML="";

for(let p in cart){

const d=document.createElement("div");

d.innerText=p+" x"+cart[p];

c.appendChild(d);

}

}

window.inviaOrdine=async function(){

const piatti=[];

for(let p in cart){

for(let i=0;i<cart[p];i++){

piatti.push({
nome:p,
stato:"preparazione"
})

}

}

await addDoc(collection(db,"ordini"),{

piatti:piatti

});

cart={};

location.reload();

}

const ordiniDiv=document.getElementById("ordini");

onSnapshot(collection(db,"ordini"),snap=>{

ordiniDiv.innerHTML="";

snap.forEach(doc=>{

const o=doc.data();

const div=document.createElement("div");

let html="";

o.piatti.forEach(p=>{

html+=p.nome+" - "+p.stato+"<br>";

});

div.innerHTML=html+"<hr>";

ordiniDiv.appendChild(div);

});

});

</script>

</body>
</html>
