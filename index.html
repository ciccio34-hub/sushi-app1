<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sushi Test</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

header{
text-align:center;
padding:25px;
font-size:40px;
color:gold;
border-bottom:3px solid gold;
}

.container{
display:flex;
gap:25px;
padding:20px;
}

.menu{
width:70%;
}

.section{
margin-bottom:30px;
}

.section h2{
color:gold;
border-left:4px solid gold;
padding-left:10px;
}

.item{
background:#1a1a1a;
padding:15px;
margin:10px 0;
border-radius:10px;
border:1px solid gold;
text-align:center;
}

button{
padding:6px 12px;
background:gold;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.cart{
width:30%;
background:#1a1a1a;
padding:20px;
border-radius:12px;
border:1px solid gold;
}

.orders{
margin-top:20px;
border-top:2px solid gold;
padding-top:15px;
}

</style>
</head>

<body>

<header>SUSHI TEST</header>

<div class="container">

<div class="menu">

<div class="section">
<h2>Antipasti</h2>

<div class="item">
Nuvole di Drago €3
<button onclick="add('Nuvole di Drago',3)">+</button>
</div>

<div class="item">
Gyoza €5
<button onclick="add('Gyoza',5)">+</button>
</div>

</div>

</div>

<div class="cart">

<h3>Carrello</h3>
<div id="cartItems"></div>

Totale €<span id="total">0</span>

<button onclick="send()">Invia Ordine</button>

<div class="orders">
<h3>Ordini Salvati</h3>
<div id="saved"></div>
</div>

</div>

</div>

<script>

let cart=[];
let orders=[];

function add(name,price){

let found=cart.find(i=>i.name===name);

if(!found){
cart.push({name,price,qty:1});
}
else{
found.qty++;
}

update();
}

function update(){

let div=document.getElementById("cartItems");
let total=document.getElementById("total");

div.innerHTML="";
let sum=0;

cart.forEach(i=>{
sum+=i.price*i.qty;
div.innerHTML+=i.name+" x"+i.qty+"<br>";
});

total.innerText=sum;
}

function send(){

if(cart.length===0){
alert("Carrello vuoto");
return;
}

orders.push([...cart]);
cart=[];
update();
showOrders();
}

function showOrders(){

let div=document.getElementById("saved");
div.innerHTML="";

orders.forEach((o,index)=>{
div.innerHTML+="Ordine "+(index+1)+"<br>";
o.forEach(i=>{
div.innerHTML+=i.name+" x"+i.qty+"<br>";
});
div.innerHTML+="<hr>";
});

}

</script>

</body>
</html>
