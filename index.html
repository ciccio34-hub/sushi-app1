<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sushi ORDINI</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --dark-bg: #1c1c1c;
            --dark-surface: #2a2a2a;
            --accent-gold: #FFD700;
            --text-light: #f0f0f0;
            --text-muted: #aaaaaa;
            --border-color: #444444;
            --success-color: #4CAF50;
            --pending-color: #FFA500;
            --delete-color: #f44336;
        }

        body {
            margin: 0;
            font-family: 'Open Sans', sans-serif;
            background: var(--dark-bg);
            color: var(--text-light);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: var(--dark-surface);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        header h1 {
            margin: 0;
            font-size: 28px;
            font-family: 'Montserrat', sans-serif;
            color: var(--accent-gold);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .container {
            display: flex;
            padding: 20px;
            gap: 20px;
            height: calc(100vh - 80px);
        }

        .menu-panel, .cart-panel {
            padding: 25px;
            border-radius: 12px;
            background: var(--dark-surface);
            overflow-y: auto;
        }

        .menu-panel { flex: 2; }
        .cart-panel { flex: 1; }

        h2 {
            color: var(--accent-gold);
            font-family: 'Montserrat', sans-serif;
            margin-bottom: 15px;
        }

        .grid-items {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
        }

        .grid-item {
            background: var(--dark-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            position: relative;
        }

        .grid-item img {
            max-width: 80px;
            max-height: 50px;
            border-radius: 5px;
            margin-bottom: 5px;
            object-fit: cover;
        }

        .quantity-controls button {
            background: var(--accent-gold);
            border: none;
            padding: 6px 10px;
            border-radius: 6px;
            color: var(--dark-bg);
            font-weight: bold;
            margin: 2px;
            cursor: pointer;
        }

        .quantity-controls button:hover {
            background: #e0b600;
        }

        .item-count {
            position: absolute;
            top: 5px;
            right: 5px;
            background-color: var(--accent-gold);
            color: var(--dark-bg);
            border-radius: 50%;
            padding: 3px 8px;
            font-size: 12px;
            display: none;
        }

        .item-count.visible { display: block; }

        .send-order-button {
            width: 100%;
            padding: 12px;
            background: var(--accent-gold);
            color: var(--dark-bg);
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
        }

        .send-order-button:hover { background: #e0b600; }

        #orders p {
            margin: 5px 0;
            font-size: 16px;
        }

        @media (max-width: 768px) {
            .container { flex-direction: column; height: auto; }
            .menu-panel, .cart-panel { width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <h1><i class="fas fa-sushi"></i> Sushi</h1>
    </header>

    <div class="container">
        <div class="menu-panel" id="menu">
            <!-- Menu Items -->
            <div class="section">
                <h2>Bevande</h2>
                <div class="grid-items">
                    <div class="grid-item" onclick="addItem('Acqua naturale',1,'Bevande')">
                        <img src="https://i.imgur.com/wcCYQks.jpeg" alt="Acqua naturale">
                        <span>Acqua naturale €1.00</span>
                        <div class="quantity-controls">
                            <button onclick="event.stopPropagation(); removeItemFromCartByMenuButton('Acqua naturale')">-</button>
                            <button onclick="event.stopPropagation(); addItem('Acqua naturale',1,'Bevande')">+</button>
                        </div>
                        <div class="item-count" id="Acqua-naturale-count">0</div>
                    </div>
                    <div class="grid-item" onclick="addItem('Acqua frizzante',1,'Bevande')">
                        <img src="https://i.imgur.com/mqpVNrh.jpeg" alt="Acqua frizzante">
                        <span>Acqua frizzante €1.00</span>
                        <div class="quantity-controls">
                            <button onclick="event.stopPropagation(); removeItemFromCartByMenuButton('Acqua frizzante')">-</button>
                            <button onclick="event.stopPropagation(); addItem('Acqua frizzante',1,'Bevande')">+</button>
                        </div>
                        <div class="item-count" id="Acqua-frizzante-count">0</div>
                    </div>
                </div>
            </div>

            <!-- Altri Sections come Antipasti, Sashimi, Nigiri -->
            <!-- Per brevità puoi copiare la stessa struttura grid-item con nome, prezzo, immagine -->
        </div>

        <div class="cart-panel">
            <h2><i class="fas fa-shopping-cart"></i> Carrello</h2>
            <div id="cart-items"></div>
            <button class="send-order-button" onclick="sendOrder()">Invia Ordine</button>

            <h2>I tuoi ordini</h2>
            <div id="orders"></div>
            <h3 id="total">Totale Sushi: €0.00</h3>
        </div>
    </div>

    <script>
        let cart = {};
        let currentCartRunningTotal = 0;
        let localOrders = [];

        function addItem(name, price, section) {
            if(!cart[name]) cart[name] = {q:0, p:price, section: section};
            cart[name].q++;
            currentCartRunningTotal += price;
            updateCartDisplay();
        }

        function removeItemFromCartByMenuButton(name) {
            if(cart[name] && cart[name].q>0) {
                cart[name].q--;
                currentCartRunningTotal -= cart[name].p;
                if(cart[name].q<=0) delete cart[name];
                updateCartDisplay();
            }
        }

        function updateCartDisplay() {
            const cartItemsElement = document.getElementById('cart-items');
            cartItemsElement.innerHTML = '';
            Object.keys(cart).forEach(k=>{
                cartItemsElement.innerHTML += `<p>${k} (${cart[k].section}) x${cart[k].q}</p>`;
            });
        }

        function sendOrder() {
            if(Object.keys(cart).length===0){ alert("Carrello vuoto!"); return; }
            let order = {items: [], total: currentCartRunningTotal};
            Object.keys(cart).forEach(k=>{
                for(let i=0;i<cart[k].q;i++){
                    order.items.push({name:k, section:cart[k].section, price:cart[k].p, status:'prep'});
                }
            });
            localOrders.push(order);
            cart = {}; currentCartRunningTotal = 0;
            updateCartDisplay(); updateOrdersDisplay();
            alert('Ordine inviato!');
        }

        function updateOrdersDisplay() {
            const ordersEl = document.getElementById('orders');
            ordersEl.innerHTML = '';
            localOrders.forEach((o,i)=>{
                o.items.forEach(it=>{
                    ordersEl.innerHTML += `<p>${it.name} (${it.section}) - ${it.status==='ready'?'Pronto':'In preparazione'}</p>`;
                });
            });
        }
    </script>

</body>
</html>
