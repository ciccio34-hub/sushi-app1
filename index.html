
<!DOCTYPE html>
<html>
<head>
  <title>Menu Sushi</title>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #141e30, #243b55);
      color: white;
    }

    header {
      text-align: center;
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
    }

    .container {
      display: flex;
      padding: 20px;
      gap: 20px;
    }

    .menu {
      flex: 3;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .item {
      background: white;
      color: black;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }

    button {
      background: #ff4b5c;
      border: none;
      color: white;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .cart {
      flex: 1;
      background: rgba(0,0,0,0.4);
      padding: 20px;
      border-radius: 15px;
    }

    .status-box {
      margin-top: 20px;
      background: rgba(255,255,255,0.1);
      padding: 10px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<header>🍣 MENU SUSHI</header>

<div class="container">
  <div class="menu" id="menu"></div>

  <div class="cart">
    <h3>Carrello</h3>
    <div id="cartList"></div>
    <h4>Totale: €<span id="total">0</span></h4>
    <button onclick="sendOrder()">Invia Ordine</button>

    <div class="status-box">
      <h4>I tuoi ordini</h4>
      <div id="orderStatus"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCW2MF4P8D9lYtQML-ZwZPbjF-MDIOHIC4",
  authDomain: "sushi-web-54e9b.firebaseapp.com",
  projectId: "sushi-web-54e9b",
  storageBucket: "sushi-web-54e9b.firebasestorage.app",
  messagingSenderId: "1023587576077",
  appId: "1:1023587576077:web:1024f53b1895b133556844"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const dishes = [
  {name:"Uramaki Salmone", price:8},
  {name:"Uramaki Avocado", price:7},
  {name:"Uramaki Philadelphia", price:9},
  {name:"Nigiri Tonno", price:6},
  {name:"Nigiri Salmone", price:6},
  {name:"Nigiri Branzino", price:7},
  {name:"Tempura Gamberi", price:10},
  {name:"Sashimi Mix", price:14},
  {name:"Hosomaki Cetriolo", price:5},
  {name:"Hosomaki Tonno", price:6},
  {name:"Gyoza", price:6},
  {name:"Edamame", price:4},
  {name:"Ramen", price:11},
  {name:"Yakitori", price:9},
  {name:"Spicy Tuna Roll", price:9},
  {name:"Dragon Roll", price:13},
  {name:"California Roll", price:8},
  {name:"Mochi Gelato", price:5}
];

let cart = [];

const menuDiv = document.getElementById("menu");

dishes.forEach(dish=>{
  const div = document.createElement("div");
  div.className = "item";
  div.innerHTML = `
    <h4>${dish.name}</h4>
    <p>€${dish.price}</p>
    <div class="controls">
      <button onclick="changeQty('${dish.name}',${dish.price},-1)">-</button>
      <span id="qty-${dish.name}">0</span>
      <button onclick="changeQty('${dish.name}',${dish.price},1)">+</button>
    </div>
  `;
  menuDiv.appendChild(div);
});

window.changeQty = function(name, price, amount){
  let found = cart.find(i=>i.name===name);

  if(!found && amount>0){
    cart.push({name, price, qty:1});
  } else if(found){
    found.qty += amount;
    if(found.qty<=0){
      cart = cart.filter(i=>i.name!==name);
    }
  }

  document.getElementById("qty-"+name).innerText =
    cart.find(i=>i.name===name)?.qty || 0;

  updateCart();
}

function updateCart(){
  const list = document.getElementById("cartList");
  const totalEl = document.getElementById("total");

  list.innerHTML="";
  let total=0;

  cart.forEach(item=>{
    total += item.price*item.qty;
    list.innerHTML+=`<div>${item.name} x${item.qty}</div>`;
  });

  totalEl.innerText=total;
}

window.sendOrder = async function(){
  if(cart.length===0){
    alert("Carrello vuoto");
    return;
  }

  await addDoc(collection(db,"orders"),{
    items: cart,
    total: cart.reduce((sum,i)=>sum+i.price*i.qty,0),
    status:"in preparazione",
    time:new Date()
  });

  alert("Ordine inviato!");
  cart=[];
  location.reload();
};

const orderStatus = document.getElementById("orderStatus");

onSnapshot(collection(db,"orders"), snapshot=>{
  orderStatus.innerHTML="";
  snapshot.forEach(doc=>{
    const data = doc.data();
    orderStatus.innerHTML += `
      <div>
        Stato: ${data.status} - €${data.total}
      </div>
    `;
  });
});
</script>

</body>
</html>
