<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sushi</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

header{
text-align:center;
padding:20px;
font-size:40px;
color:gold;
border-bottom:2px solid gold;
}

.container{
display:flex;
}

.menu{
width:70%;
padding:20px;
}

.cart{
width:30%;
background:#222;
padding:20px;
}

.section{
margin-bottom:30px;
}

.item{
background:#333;
padding:10px;
margin:10px 0;
border-radius:8px;
}

button{
margin:3px;
padding:5px 10px;
cursor:pointer;
}

.plus{
background:gold;
border:none;
}

.minus{
background:#555;
color:white;
border:none;
}
</style>
</head>

<body>

<header>SUSHI</header>

<div class="container">

<div class="menu">

<div class="section">
<h2>Bevande</h2>
<div class="item">Acqua Naturale €2 
<button class="minus" onclick="add('Acqua Naturale',2,-1)">-</button>
<button class="plus" onclick="add('Acqua Naturale',2,1)">+</button>
</div>

<div class="item">Acqua Frizzante €2 
<button class="minus" onclick="add('Acqua Frizzante',2,-1)">-</button>
<button class="plus" onclick="add('Acqua Frizzante',2,1)">+</button>
</div>
</div>

<div class="section">
<h2>Antipasti</h2>
<div class="item">Nuvole di Drago €3 
<button class="minus" onclick="add('Nuvole di Drago',3,-1)">-</button>
<button class="plus" onclick="add('Nuvole di Drago',3,1)">+</button>
</div>

<div class="item">Involtini Primavera €4 
<button class="minus" onclick="add('Involtini Primavera',4,-1)">-</button>
<button class="plus" onclick="add('Involtini Primavera',4,1)">+</button>
</div>

<div class="item">Gyoza €5 
<button class="minus" onclick="add('Gyoza',5,-1)">-</button>
<button class="plus" onclick="add('Gyoza',5,1)">+</button>
</div>

<div class="item">Ravioli di Gambero €6 
<button class="minus" onclick="add('Ravioli di Gambero',6,-1)">-</button>
<button class="plus" onclick="add('Ravioli di Gambero',6,1)">+</button>
</div>
</div>

<div class="section">
<h2>Sashimi</h2>
<div class="item">Sashimi Salmone €8 
<button class="minus" onclick="add('Sashimi Salmone',8,-1)">-</button>
<button class="plus" onclick="add('Sashimi Salmone',8,1)">+</button>
</div>

<div class="item">Sashimi Tonno €8 
<button class="minus" onclick="add('Sashimi Tonno',8,-1)">-</button>
<button class="plus" onclick="add('Sashimi Tonno',8,1)">+</button>
</div>
</div>

<div class="section">
<h2>Dolci</h2>
<div class="item">Gelato €5 
<button class="minus" onclick="add('Gelato',5,-1)">-</button>
<button class="plus" onclick="add('Gelato',5,1)">+</button>
</div>
</div>

</div>

<div class="cart">
<h3>Carrello</h3>
<div id="cart"></div>
Totale €<span id="tot">0</span>
</div>

</div>

<script>

let cart = [];

function add(nome, prezzo, q){

let trovato = cart.find(p => p.nome === nome);

if(!trovato && q>0){
cart.push({nome:nome, prezzo:prezzo, quantita:1});
}
else if(trovato){
trovato.quantita += q;
if(trovato.quantita <=0){
cart = cart.filter(p => p.nome !== nome);
}
}

aggiorna();
}

function aggiorna(){

let div = document.getElementById("cart");
let tot = document.getElementById("tot");

div.innerHTML="";
let totale=0;

cart.forEach(p=>{
totale += p.prezzo * p.quantita;
div.innerHTML += p.nome + " x" + p.quantita + "<br>";
});

tot.innerText = totale;
}

</script>

</body>
</html>
