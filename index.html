<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sushi</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

header{
text-align:center;
padding:20px;
font-size:40px;
color:gold;
border-bottom:2px solid gold;
}

.container{
display:flex;
}

.menu{
width:70%;
padding:20px;
}

.cart{
width:30%;
background:#222;
padding:20px;
}

.section{
margin-bottom:30px;
}

.item{
background:#333;
padding:10px;
margin:10px 0;
border-radius:8px;
}

button{
padding:5px 10px;
margin:4px;
cursor:pointer;
}

.plus{
background:gold;
border:none;
}

.order-btn{
background:gold;
border:none;
padding:10px;
width:100%;
font-weight:bold;
}
</style>
</head>

<body>

<header>SUSHI</header>

<div class="container">

<div class="menu">

<h2>Antipasti</h2>
<div class="item">
Nuvole di Drago €3
<button class="plus" onclick="add('Nuvole di Drago',3)">+</button>
</div>

<div class="item">
Gyoza €5
<button class="plus" onclick="add('Gyoza',5)">+</button>
</div>

<h2>Nigiri</h2>

<div class="item">
Nigiri Salmone €6
<button class="plus" onclick="add('Nigiri Salmone',6)">+</button>
</div>

<div class="item">
Nigiri Tonno €6
<button class="plus" onclick="add('Nigiri Tonno',6)">+</button>
</div>

<h2>Dolci</h2>

<div class="item">
Gelato €5
<button class="plus" onclick="add('Gelato',5)">+</button>
</div>

<button class="order-btn" onclick="sendOrder()">Invia Ordine</button>

</div>

<div class="cart">

<h3>Carrello</h3>
<div id="cart"></div>
Totale €<span id="total">0</span>

<h3>Ordini Cucina</h3>
<div id="cucina"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, deleteDoc, doc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCW2MF4P8D9lYtQML-ZwZPbjF-MDIOHIC4",
authDomain: "sushi-web-54e9b.firebaseapp.com",
projectId: "sushi-web-54e9b",
storageBucket: "sushi-web-54e9b.firebasestorage.app",
appId: "1:1023587576077:web:1024f53b1895b133556844"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cart = [];

/* ===== AGGIUNTA PRODOTTI ===== */

window.add = function(name,price){

let found = cart.find(i=>i.name===name);

if(!found){
cart.push({name,price,qty:1});
}
else{
found.qty++;
}

updateCart();
}

function updateCart(){

let div=document.getElementById("cart");
let total=document.getElementById("total");

div.innerHTML="";
let sum=0;

cart.forEach(item=>{
sum+=item.price*item.qty;
div.innerHTML+=item.name+" x"+item.qty+"<br>";
});

total.innerText=sum;
}

window.sendOrder = async function(){

if(cart.length===0){
alert("Carrello vuoto");
return;
}

await addDoc(collection(db,"orders"),{
items:cart,
stato:"In preparazione",
time:new Date()
});

cart=[];
updateCart();
alert("Ordine inviato!");
}

/* ===== ORDINI IN TEMPO REALE ===== */

onSnapshot(collection(db,"orders"),snapshot=>{

let cucina=document.getElementById("cucina");
cucina.innerHTML="";

snapshot.forEach(docSnap=>{

let data=docSnap.data();
let statoColor = data.stato === "Pronto" ? "green" : "red";

let itemsText="";

data.items.forEach(i=>{
itemsText+=i.name+" x"+i.qty+"<br>";
});

cucina.innerHTML+=`
<div style="border:2px solid gold;padding:10px;margin:10px;">
<strong>Ordine</strong><br>
${itemsText}
<br>
Stato:
<span style="color:${statoColor};font-weight:bold;">
${data.stato}
</span>
<br><br>

<button onclick="markReady('${docSnap.id}')">✅ Pronto</button>
<button onclick="deleteOrder('${docSnap.id}')" style="background:red;color:white;">
🗑 Elimina
</button>

</div>
`;

});
});

/* ===== CAMBIA STATO ===== */

window.markReady = async function(id){

await updateDoc(doc(db,"orders",id),{
stato:"Pronto"
});

}

/* ===== ELIMINA ORDINE ===== */

window.deleteOrder = async function(id){

await deleteDoc(doc(db,"orders",id));

}

</script>

</body>
</html>
