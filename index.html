<button onclick="sendOrder()">Invia Ordine</button>

<script>
async function sendOrder(){

const order = {
table: "Tavolo 3",
items:[
{name:"Salmon Nigiri",qty:2},
{name:"Tuna Roll",qty:1}
],
time:new Date().toISOString()
};

await fetch("https://api.tuosito.com/orders",{
method:"POST",
headers:{
"Content-Type":"application/json",
"api-key":"LA_TUA_API_KEY"
},
body:JSON.stringify(order)
});

alert("Ordine inviato alla cucina!");

}
</script>
