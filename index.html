<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Menu Sushi</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#111;
color:white;
padding:15px;
text-align:center;
}

.menu{
padding:20px;
}

.item{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
display:flex;
justify-content:space-between;
}

.cart{
background:white;
padding:20px;
margin:20px;
border-radius:10px;
}

button{
background:#ff4d4d;
border:none;
padding:6px 10px;
border-radius:6px;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<header>
<h1>🍣 Sushi Menu</h1>
</header>

<div class="menu" id="menu"></div>

<div class="cart">

<h2>Carrello</h2>

<div id="cart"></div>

<h3 id="total">Totale €0</h3>

<button onclick="sendOrder()">Invia Ordine</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import { getFirestore,collection,addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"

const firebaseConfig = {
apiKey: "AIzaSyCW2MF4P8D9lYtQML-ZwPbjF-MDIOHIC4",
authDomain: "sushi-web-54e9b.firebaseapp.com",
projectId: "sushi-web-54e9b",
storageBucket: "sushi-web-54e9b.firebasestorage.app",
messagingSenderId: "1023587576077",
appId: "1:1023587576077:web:1024f53b1895b133556844"
}

const app = initializeApp(firebaseConfig)
const db = getFirestore(app)

let cart={}
let total=0

const menuData=[
{name:"Salmon Nigiri",price:5},
{name:"Tuna Roll",price:6},
{name:"Uramaki",price:7},
{name:"Sashimi",price:8}
]

function renderMenu(){

let html=""

menuData.forEach(item=>{

html+=`

<div class="item">

<div>
${item.name}<br>
€${item.price}
</div>

<div>

<button onclick="add('${item.name}',${item.price})">+</button>
<button onclick="remove('${item.name}',${item.price})">-</button>

</div>

</div>

`

})

document.getElementById("menu").innerHTML=html

}

window.add=(name,price)=>{

if(!cart[name]) cart[name]={qty:0,price}

cart[name].qty++
total+=price

updateCart()

}

window.remove=(name,price)=>{

if(!cart[name]) return

cart[name].qty--
total-=price

if(cart[name].qty<=0) delete cart[name]

updateCart()

}

function updateCart(){

let html=""

Object.keys(cart).forEach(name=>{
html+=name+" x "+cart[name].qty+"<br>"
})

document.getElementById("cart").innerHTML=html
document.getElementById("total").innerText="Totale €"+total

}

window.sendOrder=async()=>{

let items=[]

Object.keys(cart).forEach(name=>{

for(let i=0;i<cart[name].qty;i++){

items.push({
name:name,
status:"wait"
})

}

})

await addDoc(collection(db,"orders"),{
items:items,
time:Date.now()
})

cart={}
total=0

updateCart()

alert("Ordine inviato")

}

renderMenu()

</script>

</body>
</html>
