<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sushi ORDINI</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:black;
color:gold;
display:flex;
flex-direction:column;
height:100vh;
}

header{
text-align:center;
padding:20px;
font-size:28px;
}

.container{
display:flex;
flex:1;
overflow:hidden;
}

.menu{
flex:3;
padding:20px;
overflow:auto;
}

.section{
margin-bottom:40px;
}

.section h2{
border-left:5px solid gold;
padding-left:10px;
margin-bottom:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
gap:15px;
}

.dish{
height:150px;
border-radius:12px;
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
justify-content:end;
padding:10px;
background-blend-mode:darken;
background-color:rgba(0,0,0,0.4);
}

.dish-name{
font-weight:bold;
}

.price{
font-size:14px;
}

.buttons{
display:flex;
gap:5px;
margin-top:5px;
}

button{
background:gold;
border:none;
border-radius:6px;
cursor:pointer;
padding:5px 10px;
font-weight:bold;
}

button:hover{
background:#ffcc00;
}

.cart{
flex:1;
background:#111;
padding:20px;
border-left:2px solid #333;
overflow:auto;
}

.cart-item{
display:flex;
justify-content:space-between;
padding:5px 0;
border-bottom:1px solid #333;
}

.total{
font-size:22px;
margin-top:15px;
font-weight:bold;
}

.orderBtn{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
}

</style>
</head>

<body>

<header>🍣 Sushi ORDINI</header>

<div class="container">

<div class="menu" id="menu"></div>

<div class="cart">

<h2>🛒 Carrello</h2>

<div id="cart"></div>

<div class="total" id="total">
Costo della cena: €0
</div>

<button class="orderBtn" onclick="sendOrder()">Invia ordine</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCW2MF4P8D9lYtQML-ZwZPbjF-MDIOHIC4",
authDomain: "sushi-web-54e9b.firebaseapp.com",
projectId: "sushi-web-54e9b",
storageBucket: "sushi-web-54e9b.firebasestorage.app",
messagingSenderId: "1023587576077",
appId: "1:1023587576077:web:1024f53b1895b133556844"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cart={}
let total=0

const menuData=[

{
section:"Bevande",
items:[
{name:"Acqua naturale",price:1,img:"acqua.jpg"},
{name:"Acqua frizzante",price:1,img:"acqua.jpg"}
]
},

{
section:"Antipasti",
items:[
{name:"Nuvole di drago",price:5,img:"nuvole.jpg"},
{name:"Involtini primavera",price:4,img:"involtini.jpg"},
{name:"Gyoza",price:4,img:"gyoza.jpg"},
{name:"Ravioli di gambero",price:5,img:"ravioli.jpg"},
{name:"Spaghetti di riso",price:5,img:"spaghetti.jpg"},
{name:"Sushi Cake",price:8,img:"sushi_cake.jpg"}
]
},

{
section:"Sashimi",
items:[
{name:"Sashimi salmone",price:7,img:"sashimi_salmone.jpg"},
{name:"Sashimi tonno",price:7,img:"sashimi_tonno.jpg"}
]
},

{
section:"Nigiri",
items:[
{name:"Nigiri salmone",price:5,img:"nigiri_salmone.jpg"},
{name:"Nigiri tonno",price:5,img:"nigiri_tonno.jpg"}
]
},

{
section:"Roll",
items:[
{name:"Roll salmone",price:6,img:"roll_salmone.jpg"},
{name:"Roll tonno",price:6,img:"roll_tonno.jpg"},
{name:"Roll gambero",price:6,img:"roll_gambero.jpg"}
]
}

]

function renderMenu(){

let html=""

menuData.forEach(section=>{

html+=`<div class="section">

<h2>${section.section}</h2>

<div class="grid">`

section.items.forEach(item=>{

html+=`

<div class="dish" style="background-image:url('${item.img}')">

<div class="dish-name">${item.name}</div>
<div class="price">€${item.price}</div>

<div class="buttons">
<button onclick="addItem('${item.name}',${item.price})">+</button>
<button onclick="removeItem('${item.name}',${item.price})">−</button>
</div>

</div>

`

})

html+=`</div></div>`

})

document.getElementById("menu").innerHTML=html

}

window.addItem=function(name,price){

if(!cart[name]) cart[name]={qty:0,price:price}

cart[name].qty++

total+=price

updateCart()

}

window.removeItem=function(name,price){

if(!cart[name]) return

cart[name].qty--

total-=price

if(cart[name].qty<=0) delete cart[name]

updateCart()

}

function updateCart(){

let html=""

Object.keys(cart).forEach(name=>{

let item=cart[name]

html+=`

<div class="cart-item">

<span>${name} x${item.qty}</span>

<span>€${item.qty*item.price}</span>

</div>

`

})

document.getElementById("cart").innerHTML=html

document.getElementById("total").innerText="Costo della cena: €"+total

}

window.sendOrder=async function(){

if(Object.keys(cart).length===0){

alert("Carrello vuoto")

return

}

await addDoc(collection(db,"orders"),{
items:cart,
total:total,
time:Date.now()
})

alert("Ordine inviato!")

cart={}
total=0
updateCart()

}

renderMenu()

</script>

</body>
</html>
