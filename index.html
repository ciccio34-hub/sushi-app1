<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sushi Order</title>

<style>

body{
font-family:Arial;
margin:0;
padding:20px;
text-align:center;
background:linear-gradient(135deg,#ff6b6b,#ffb347);
color:white;
}

h1{
margin-bottom:20px;
}

#menu{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.item{
background:white;
color:black;
padding:20px;
border-radius:15px;
width:200px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

button{
background:#ff4d4d;
color:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#cc0000;
}

#cartBox{
background:white;
color:black;
margin-top:40px;
padding:20px;
border-radius:15px;
width:300px;
margin-left:auto;
margin-right:auto;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

</style>
</head>

<body>

<h1>🍣 Sushi Menu</h1>

<div id="menu">

<div class="item">
<h3>Salmon Nigiri</h3>
<p>€5</p>
<button onclick="addToCart('Salmon Nigiri',5)">Aggiungi</button>
</div>

<div class="item">
<h3>Tuna Roll</h3>
<p>€6</p>
<button onclick="addToCart('Tuna Roll',6)">Aggiungi</button>
</div>

<div class="item">
<h3>Sashimi</h3>
<p>€8</p>
<button onclick="addToCart('Sashimi',8)">Aggiungi</button>
</div>

</div>

<div id="cartBox">

<h2>🛒 Carrello</h2>

<ul id="cart"></ul>

<h3 id="total">Totale: €0</h3>

<button onclick="sendOrder()">📤 Invia Ordine</button>

</div>
