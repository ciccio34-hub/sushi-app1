<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sushi Ordine</title>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#ff6b6b,#ffb347);
text-align:center;
color:white;
padding:20px;
}

.item{
background:white;
color:black;
padding:15px;
border-radius:12px;
margin:10px;
display:inline-block;
width:200px;
}

button{
padding:6px 10px;
border:none;
border-radius:6px;
background:#ff4d4d;
color:white;
cursor:pointer;
margin:3px;
}

button:hover{
background:#cc0000;
}

#cartBox{
background:white;
color:black;
padding:15px;
border-radius:12px;
width:350px;
margin:auto;
margin-top:30px;
}
</style>
</head>

<body>

<h1>🍣 Sushi Menu</h1>

<div id="menu">
  <div class="item">
    <h3>Salmon Nigiri</h3>
    <p>€5</p>
    <button onclick="addItem('Salmon Nigiri',5)">➕</button>
    <button onclick="removeItem('Salmon Nigiri')">➖</button>
  </div>
  <div class="item">
    <h3>Tuna Roll</h3>
    <p>€6</p>
    <button onclick="addItem('Tuna Roll',6)">➕</button>
    <button onclick="removeItem('Tuna Roll')">➖</button>
  </div>
  <div class="item">
    <h3>Sashimi</h3>
    <p>€8</p>
    <button onclick="addItem('Sashimi',8)">➕</button>
    <button onclick="removeItem('Sashimi')">➖</button>
  </div>
</div>

<div id="cartBox">
<h2>🛒 Carrello</h2>
<div id="cart"></div>
<h3 id="total">Totale: €0</h3>
<button onclick="sendOrder()">📤 Invia Ordine</button>
</div>

import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cart = {};

window.addItem = function(name,price){
  if(!cart[name]){
    cart[name]={price:price,qty:0};
  }
  cart[name].qty++;
  updateCart();
}

window.removeItem = function(name){
  if(cart[name]){
    cart[name].qty--;
    if(cart[name].qty<=0){
      delete cart[name];
    }
  }
  updateCart();
}

function updateCart(){
  const cartDiv=document.getElementById("cart");
  cartDiv.innerHTML="";
  let total=0;
  Object.keys(cart).forEach(name=>{
    let item=cart[name];
    total += item.price*item.qty;
    cartDiv.innerHTML += `
      <div>${name} - ${item.qty} x €${item.price}</div>
    `;
  });
  document.getElementById("total").innerText = "Totale: €" + total;
}

window.sendOrder = async function(){
  if(Object.keys(cart).length===0){
    alert("Carrello vuoto ❌");
    return;
  }

  let items = [];
  Object.keys(cart).forEach(name=>{
    items.push({name:name,qty:cart[name].qty,price:cart[name].price});
  });
