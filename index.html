<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sushi ORDINI - Selezione Interfaccia</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css"> <!-- Collega il CSS esterno -->
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--dark-bg);
            color: var(--text-light);
            font-family: 'Open Sans', sans-serif;
            text-align: center;
        }
       .start-container {
            background: var(--dark-surface);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 90%;
        }
       .start-container h1 {
            color: var(--accent-gold);
            font-family: 'Montserrat', sans-serif;
            font-size: 36px;
            margin-bottom: 30px;
        }
       .start-button {
            display: block;
            width: 100%;
            padding: 15px 25px;
            margin-bottom: 20px;
            border: none;
            border-radius: 8px;
            background: var(--accent-gold);
            color: var(--dark-bg);
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.3s ease, transform 0.2s ease;
        }
       .start-button:hover {
            background: #e0b600;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="start-container">
        <h1><i class="fas fa-sushi"></i> Sushi ORDINI</h1>
        <a href="menu.html" class="start-button">Vai al Menu (Ordini)</a>
        <a href="kitchen.html" class="start-button">Vai alla Cucina</a>
    </div>
</body>
</html>
