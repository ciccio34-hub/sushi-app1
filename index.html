<!DOCTYPE html>
<html>
<head>
<title>Sushi Sistema</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#e53935;
color:white;
padding:15px;
text-align:center;
}

.container{
display:flex;
height:90vh;
}

/* CARRELLO */

.cart{
width:35%;
background:white;
padding:20px;
overflow:auto;
border-right:3px solid #ddd;
}

.cart h2{
margin-top:0;
}

/* MENU */

.menu{
width:65%;
padding:20px;
overflow:auto;
}

.item{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

button{
padding:6px 10px;
background:#e53935;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin:3px;
}

.status-prep{
color:orange;
font-weight:bold;
}

.status-ready{
color:green;
font-weight:bold;
}

.order{
background:#fff;
padding:10px;
margin-top:10px;
border-radius:8px;
}

</style>
</head>

<body>

<header>
<h1>🍣 Sushi Sistema Ordini</h1>
<button onclick="cliente()">Cliente</button>
<button onclick="cucina()">Cucina</button>
</header>

<div id="clienteView" class="container">

<div class="cart">

<h2>🛒 Carrello</h2>

<div id="cartItems"></div>

<h3 id="total">Totale €0</h3>

<button onclick="sendOrder()">Invia ordine</button>

<h2>📋 I tuoi ordini</h2>

<div id="myOrders"></div>

</div>

<div class="menu" id="menu"></div>

</div>

<div id="cucinaView" style="display:none;padding:20px">
<h2>👨‍🍳 Ordini Cucina</h2>
<div id="kitchenOrders"></div>
</div>

<script>

let cart={}
let total=0

let orders=[]

let menuData=[
{name:"Salmon Nigiri",price:5},
{name:"Tuna Roll",price:6},
{name:"Sashimi",price:8},
{name:"Uramaki",price:7}
]

function cliente(){

document.getElementById("clienteView").style.display="flex"
document.getElementById("cucinaView").style.display="none"

renderMenu()
renderOrders()

}

function cucina(){

document.getElementById("clienteView").style.display="none"
document.getElementById("cucinaView").style.display="block"

renderKitchen()

}

function renderMenu(){

let html=""

menuData.forEach(item=>{

html+=`
<div class="item">
<h3>${item.name}</h3>
<p>€${item.price}</p>

<button onclick="add('${item.name}',${item.price})">➕</button>
<button onclick="removeItem('${item.name}',${item.price})">➖</button>

</div>
`

})

document.getElementById("menu").innerHTML=html

}

function add(name,price){

if(!cart[name]) cart[name]={qty:0,price:price}

cart[name].qty++

total+=price

updateCart()

}

function removeItem(name,price){

if(cart[name]){

cart[name].qty--

total-=price

if(cart[name].qty<=0) delete cart[name]

}

updateCart()

}

function updateCart(){

let html=""

Object.keys(cart).forEach(name=>{

html+=name+" x "+cart[name].qty+"<br>"

})

document.getElementById("cartItems").innerHTML=html
document.getElementById("total").innerText="Totale €"+total

}

function sendOrder(){

if(Object.keys(cart).length===0){
alert("Carrello vuoto")
return
}

let items=""

Object.keys(cart).forEach(name=>{
items+=name+" x "+cart[name].qty+"<br>"
})

orders.push({
items:items,
total:total,
status:"prep"
})

cart={}
total=0

updateCart()

renderOrders()
renderKitchen()

}

function renderOrders(){

let html=""

orders.forEach(o=>{

let statusText=""

if(o.status=="prep") statusText="<span class='status-prep'>🟡 In preparazione</span>"
if(o.status=="ready") statusText="<span class='status-ready'>🟢 Pronto</span>"

html+=`
<div class="order">
${o.items}
<p>${statusText}</p>
</div>
`

})

document.getElementById("myOrders").innerHTML=html

}

function renderKitchen(){

let html=""

orders.forEach((o,i)=>{

html+=`
<div class="order">

${o.items}

<p>Totale €${o.total}</p>

<button onclick="setPrep(${i})">In preparazione</button>

<button onclick="setReady(${i})">Pronto</button>

</div>
`

})

document.getElementById("kitchenOrders").innerHTML=html

}

function setPrep(i){

orders[i].status="prep"

renderKitchen()
renderOrders()

}

function setReady(i){

orders[i].status="ready"

renderKitchen()
renderOrders()

}

cliente()

</script>

</body>
</html>
