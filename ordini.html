

<!DOCTYPE html>
<html>
<head>
  <title>Ordini Cucina</title>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial; background:#111; color:white; padding:20px; }
    .ordine {
      background:#1e1e1e;
      padding:20px;
      margin-bottom:20px;
      border-radius:10px;
    }
    .item-row { margin-bottom:8px; }
    button {
      margin-left:10px;
      padding:4px 8px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      font-weight:bold;
      background:orange;
    }
    .deleteBtn {
      background:red;
      color:white;
      margin-top:10px;
    }
  </style>
</head>
<body>

<h1>🍣 ORDINI CUCINA</h1>
<div id="listaOrdini"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, updateDoc, doc, deleteDoc, getDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "TUO_API_KEY",
  authDomain: "TUO_AUTH_DOMAIN",
  projectId: "TUO_PROJECT_ID",
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const lista=document.getElementById("listaOrdini");

onSnapshot(collection(db,"orders"), snapshot=>{
  lista.innerHTML="";

  snapshot.forEach(docSnap=>{
    const data=docSnap.data();
    const id=docSnap.id;

    let itemsHTML="";

    data.items.forEach((item,index)=>{
      itemsHTML+=`
        <div class="item-row">
          ${item.name} x${item.qty}
          <button onclick="toggleReady('${id}',${index})">
            ${item.ready ? "Annulla" : "Segna pronto"}
          </button>
        </div>
      `;
    });

    lista.innerHTML+=`
      <div class="ordine">
        ${itemsHTML}
        <strong>Totale: €${data.total}</strong><br>
        <button class="deleteBtn" onclick="deleteOrder('${id}')">Elimina Ordine</button>
      </div>
    `;
  });
});

window.toggleReady=async function(orderId,index){
  const ref=doc(db,"orders",orderId);
  const snap=await getDoc(ref);
  const data=snap.data();
  data.items[index].ready=!data.items[index].ready;
  await updateDoc(ref,{items:data.items});
};

window.deleteOrder=async function(id){
  await deleteDoc(doc(db,"orders",id));
};
</script>

</body>
</html>
