<!DOCTYPE html>
<html>
<head>
  <title>Ordini Cucina</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .ordine {
      background: #222;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
    }

    button {
      margin-top: 10px;
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      background: #00c896;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #00a37a;
    }
  </style>
</head>
<body>

<h1>ORDINI IN ARRIVO 🍣</h1>
<div id="listaOrdini"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCW2MF4P8D9lYtQML-ZwZPbjF-MDIOHIC4",
  authDomain: "sushi-web-54e9b.firebaseapp.com",
  projectId: "sushi-web-54e9b",
  storageBucket: "sushi-web-54e9b.firebasestorage.app",
  messagingSenderId: "1023587576077",
  appId: "1:1023587576077:web:1024f53b1895b133556844"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const lista = document.getElementById("listaOrdini");

onSnapshot(collection(db, "orders"), (snapshot) => {
  lista.innerHTML = "";

  snapshot.forEach((documento) => {
    const data = documento.data();
    const id = documento.id;

    const div = document.createElement("div");
    div.className = "ordine";

    let itemsHTML = "";
    data.items.forEach(item => {
      itemsHTML += "<div>• " + item.name + " - €" + item.price + "</div>";
    });

    div.innerHTML = `
      <strong>Ordine:</strong><br>
      ${itemsHTML}
      <br><strong>Totale: €${data.total}</strong>
      <br>
      <button onclick="completeOrder('${id}')">Ordine completato</button>
    `;

    lista.appendChild(div);
  });
});

window.completeOrder = async function(id) {
  await deleteDoc(doc(db, "orders", id));
}
</script>

</body>
</html>
