

<!DOCTYPE html>
<html>
<head>
  <title>Ordini Cucina</title>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial; background:#111; color:white; padding:20px; }
    .ordine {
      background:#1e1e1e;
      padding:20px;
      margin-bottom:20px;
      border-radius:10px;
      border-left:6px solid orange;
    }
    .consegnato {
      border-left:6px solid limegreen;
    }
    .item-row { margin-bottom:8px; }
    button {
      margin-left:10px;
      padding:4px 8px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      font-weight:bold;
    }
    .readyBtn { background:orange; }
    .deleteBtn { background:red; color:white; margin-top:10px; }
  </style>
</head>
<body>

<h1>🍣 ORDINI CUCINA</h1>
<div id="listaOrdini"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, updateDoc, doc, deleteDoc, getDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCW2MF4P8D9lYtQML-ZwZPbjF-MDIOHIC4",
  authDomain: "sushi-web-54e9b.firebaseapp.com",
  projectId: "sushi-web-54e9b",
  storageBucket: "sushi-web-54e9b.firebasestorage.app",
  messagingSenderId: "1023587576077",
  appId: "1:1023587576077:web:1024f53b1895b133556844"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const lista=document.getElementById("listaOrdini");

onSnapshot(collection(db,"orders"), snapshot=>{
  lista.innerHTML="";

  snapshot.forEach(docSnap=>{
    const data=docSnap.data();
    const id=docSnap.id;

    let allReady=true;
    let itemsHTML="";

    data.items.forEach((item,index)=>{
      if(!item.ready) allReady=false;

      itemsHTML+=`
        <div class="item-row">
          ${item.name} x${item.qty}
          <button class="readyBtn" onclick="toggleReady('${id}',${index})">
            ${item.ready ? "Annulla" : "Segna pronto"}
          </button>
        </div>
      `;
    });

    const div=document.createElement("div");
    div.className="ordine";
    if(allReady) div.classList.add("consegnato");

    div.innerHTML=`
      ${itemsHTML}
      <strong>Totale: €${data.total}</strong><br>
      <button class="deleteBtn" onclick="deleteOrder('${id}')">Elimina Ordine</button>
    `;

    lista.appendChild(div);
  });
});

window.toggleReady=async function(orderId,index){
  const ref=doc(db,"orders",orderId);
  const snap=await getDoc(ref);
  const data=snap.data();
  data.items[index].ready=!data.items[index].ready;
  await updateDoc(ref,{items:data.items});
};

window.deleteOrder=async function(id){
  await deleteDoc(doc(db,"orders",id));
};
</script>

</body>
</html>
