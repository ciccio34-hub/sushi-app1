<!DOCTYPE html>
<html>
<head>
  <title>Cucina</title>
  <style>
    body { font-family: Arial; background:#111; color:white; padding:20px; }
    .ordine { background:#222; padding:15px; margin:10px 0; border-radius:10px; }
    .done { background:#004d40; }
    button { margin-top:10px; padding:6px 10px; border:none; border-radius:6px; cursor:pointer; }
  </style>
</head>
<body>

<h1>🍣 ORDINI</h1>
<div id="listaOrdini"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCW2MF4P8D9lYtQML-ZwZPbjF-MDIOHIC4",
  authDomain: "sushi-web-54e9b.firebaseapp.com",
  projectId: "sushi-web-54e9b",
  storageBucket: "sushi-web-54e9b.firebasestorage.app",
  messagingSenderId: "1023587576077",
  appId: "1:1023587576077:web:1024f53b1895b133556844"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const lista = document.getElementById("listaOrdini");

onSnapshot(collection(db,"orders"), snapshot=>{
  lista.innerHTML="";

  snapshot.forEach(docSnap=>{
    const data = docSnap.data();
    const id = docSnap.id;

    let itemsHTML="";
    if(data.items){
      data.items.forEach(item=>{
        itemsHTML+=`<div>• ${item.name} x${item.qty}</div>`;
      });
    }

    const div=document.createElement("div");
    div.className="ordine";
    if(data.status==="consegnato") div.classList.add("done");

    div.innerHTML=`
      <strong>Stato:</strong> ${data.status || "in preparazione"}<br>
      ${itemsHTML}
      <strong>Totale: €${data.total}</strong><br>
      <button onclick="markDone('${id}')">Segna consegnato</button>
    `;

    lista.appendChild(div);
  });
});

window.markDone=async function(id){
  await updateDoc(doc(db,"orders",id),{
    status:"consegnato"
  });
}
</script>

</body>
</html>
