
<!DOCTYPE html>
<html>
<head>
  <title>Ordini Cucina</title>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial; background:#111; color:white; padding:20px; }
    .ordine {
      background:#1e1e1e;
      padding:20px;
      margin-bottom:15px;
      border-radius:10px;
      border-left:6px solid orange;
    }
    .consegnato { border-left:6px solid limegreen; opacity:0.7; }
    button {
      margin-top:10px;
      margin-right:5px;
      padding:6px 10px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      font-weight:bold;
    }
    .doneBtn { background:orange; }
    .deleteBtn { background:red; color:white; }
  </style>
</head>
<body>

<h1>🍣 ORDINI CUCINA</h1>
<div id="listaOrdini"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, updateDoc, doc, deleteDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCW2MF4P8D9lYtQML-ZwZPbjF-MDIOHIC4",
  authDomain: "sushi-web-54e9b.firebaseapp.com",
  projectId: "sushi-web-54e9b",
  storageBucket: "sushi-web-54e9b.firebasestorage.app",
  messagingSenderId: "1023587576077",
  appId: "1:1023587576077:web:1024f53b1895b133556844"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const lista=document.getElementById("listaOrdini");

onSnapshot(collection(db,"orders"), snapshot=>{
  lista.innerHTML="";

  snapshot.forEach(docSnap=>{
    const data=docSnap.data();
    const id=docSnap.id;

    let itemsHTML="";
    data.items.forEach(item=>{
      itemsHTML+=`<div>• ${item.name} x${item.qty}</div>`;
    });

    const div=document.createElement("div");
    div.className="ordine";
    if(data.status==="consegnato") div.classList.add("consegnato");

    div.innerHTML=`
      <strong>Stato:</strong> ${data.status}<br><br>
      ${itemsHTML}
      <br><strong>Totale: €${data.total}</strong><br>
      <button class="doneBtn" onclick="markDone('${id}')">Consegnato</button>
      <button class="deleteBtn" onclick="deleteOrder('${id}')">Elimina</button>
    `;

    lista.appendChild(div);
  });
});

window.markDone=async function(id){
  await updateDoc(doc(db,"orders",id),{status:"consegnato"});
};

window.deleteOrder=async function(id){
  await deleteDoc(doc(db,"orders",id));
};
</script>

</body>
</html>
