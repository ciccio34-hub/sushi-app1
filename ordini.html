<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cucina</title>

<style>
body{
margin:0;
font-family:Arial;
background:black;
color:white;
}

header{
text-align:center;
padding:25px;
font-size:35px;
color:gold;
border-bottom:3px solid gold;
}

.orderBox{
border:1px solid gold;
padding:15px;
margin:15px;
border-radius:10px;
}

button{
padding:6px 12px;
background:gold;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}
</style>
</head>

<body>

<header>CUCINA</header>

<div id="orders"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, updateDoc, doc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCW2MF4P8D9lYtQML-ZwZPbjF-MDIOHIC4",
authDomain: "sushi-web-54e9b.firebaseapp.com",
projectId: "sushi-web-54e9b",
storageBucket: "sushi-web-54e9b.firebasestorage.app",
messagingSenderId: "1023587576077",
appId: "1:1023587576077:web:1024f53b1895b133556844"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

onSnapshot(collection(db,"orders"),snapshot=>{
let div=document.getElementById("orders");
div.innerHTML="";
snapshot.forEach(docSnap=>{
let data=docSnap.data();
let text="";
data.items.forEach(i=>{
text+=i.name+" x"+i.qty+"<br>";
});
div.innerHTML+=`
<div class="orderBox">
${text}
Stato: ${data.stato}
<br><br>
<button onclick="markReady('${docSnap.id}')">Segna Pronto</button>
</div>
`;
});
});

window.markReady=async function(id){
await updateDoc(doc(db,"orders",id),{
stato:"Pronto"
});
};

</script>

</body>
</html>
